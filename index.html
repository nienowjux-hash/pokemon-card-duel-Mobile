<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Pokémon Card Duel Ultimate</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

/* FIX MOBILE: html e body completamente fixos - browser chrome não mexe */
html, body {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  touch-action: none;
}

/* App é o único elemento que scrolla, não o body */
#app {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  touch-action: pan-y;
  overscroll-behavior: contain;
}
@keyframes cardBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
/* === MENU ANIMATIONS === */
@keyframes titleShimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}33%{transform:translateY(-8px) rotate(2deg)}66%{transform:translateY(-4px) rotate(-2deg)}}
@keyframes starTwinkle{0%,100%{opacity:.1;transform:scale(.8)}50%{opacity:.7;transform:scale(1.2)}}
@keyframes menuBgPulse{0%,100%{background-position:0% 0%}50%{background-position:100% 100%}}
@keyframes btnGlow{0%,100%{box-shadow:0 0 8px currentColor}50%{box-shadow:0 0 20px currentColor,0 0 40px currentColor}}
@keyframes pokeBallSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes slideInUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}

/* === BUTTON STYLES === */
.btn-menu-main{
  background:linear-gradient(135deg,#f0c040,#ff8800)!important;
  color:#000!important;border:none!important;
  box-shadow:0 4px 15px rgba(240,192,0,.4);
  font-size:.95em!important;letter-spacing:.05em;
  transition:all .2s ease!important;
}
.btn-menu-main:active{transform:scale(.96)!important;box-shadow:0 2px 8px rgba(240,192,0,.3)!important;}

.btn-menu-alt{
  background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.02))!important;
  border:1px solid rgba(255,255,255,.15)!important;
  color:#ddd!important;
  transition:all .2s ease!important;
  backdrop-filter:blur(4px);
}
.btn-menu-alt:active{transform:scale(.96)!important;background:rgba(255,255,255,.1)!important;}

.btn-menu-tourney{border-color:#f0c04066!important;color:#f0c040!important;background:rgba(240,192,0,.08)!important;}
.btn-menu-deck{border-color:#44ff8866!important;color:#44ff88!important;background:rgba(68,255,136,.08)!important;}
.btn-menu-draft{border-color:#cc66ff66!important;color:#cc66ff!important;background:rgba(204,102,255,.08)!important;}
.btn-menu-mission{border-color:#44aaff66!important;color:#44aaff!important;background:rgba(68,170,255,.08)!important;}
.btn-menu-achieve{border-color:#ffaa4466!important;color:#ffaa44!important;background:rgba(255,170,68,.08)!important;}
.btn-menu-upgrade{border-color:#ff666666!important;color:#ff6666!important;background:rgba(255,102,102,.08)!important;}

/* === STAR PARTICLES === */
.star-particle{
  position:fixed;border-radius:50%;pointer-events:none;z-index:0;
  animation:starTwinkle var(--dur,3s) ease-in-out infinite;
  animation-delay:var(--delay,0s);
}

@keyframes shinePulse{0%,100%{box-shadow:0 0 8px #f0c040,0 0 16px #f0c040}50%{box-shadow:0 0 16px #ffee44,0 0 32px #f0c040,0 0 48px #ff8800}}
@keyframes achievePop{0%{transform:scale(0) translateY(40px);opacity:0}60%{transform:scale(1.1) translateY(-5px)}100%{transform:scale(1) translateY(0);opacity:1}}
.shiny-card{animation:shinePulse 2s infinite!important;border-color:#f0c040!important;}
.card-sprite-field{animation:cardBob 2.5s ease-in-out infinite;}
.mission-done{opacity:.5;text-decoration:line-through;}
.weather-badge{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2em;opacity:.08;pointer-events:none;z-index:1;}

/* iOS Safe Area - notch/Dynamic Island fix */
body{
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}
#app{
  padding-top: max(8px, env(safe-area-inset-top));
}

body{background:#060614;display:flex;justify-content:center;font-family:'Courier New',monospace;min-height:100vh;}
#app{width:100%;max-width:640px;position:relative;}
button{cursor:pointer;font-family:'Courier New',monospace;}
canvas{image-rendering:pixelated;}
@keyframes shake{0%,100%{transform:none}15%{transform:translate(-6px,-2px)}30%{transform:translate(6px,2px)}45%{transform:translate(-4px,1px)}60%{transform:translate(4px,-1px)}75%,90%{transform:translate(-1px,0)}}
@keyframes cardIn{0%{transform:scale(0)rotate(-90deg);opacity:0}70%{transform:scale(1.15)rotate(3deg)}100%{transform:scale(1)rotate(0);opacity:1}}
@keyframes dmgFloat{0%{opacity:1;transform:translateY(0)scale(2)}100%{opacity:0;transform:translateY(-60px)scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes prizeReveal{0%{transform:scale(0) rotate(-15deg);opacity:0}60%{transform:scale(1.1) rotate(3deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.prize-card:nth-child(1){animation-delay:.05s}.prize-card:nth-child(2){animation-delay:.1s}.prize-card:nth-child(3){animation-delay:.15s}.prize-card:nth-child(4){animation-delay:.2s}.prize-card:nth-child(5){animation-delay:.25s}.prize-card:nth-child(6){animation-delay:.3s}.prize-card:nth-child(7){animation-delay:.35s}.prize-card:nth-child(8){animation-delay:.4s}.prize-card:nth-child(9){animation-delay:.45s}.prize-card:nth-child(10){animation-delay:.5s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes glow{0%,100%{text-shadow:0 0 10px #f0c040,0 0 20px #f0c040}50%{text-shadow:0 0 20px #f0c040,0 0 40px #ff8800,0 0 70px #ff2200}}
@keyframes rainbow{0%{border-color:#ffcc00}25%{border-color:#ff44ff}50%{border-color:#44ffff}75%{border-color:#44ff44}100%{border-color:#ffcc00}}
@keyframes victPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes prizeReveal{0%{transform:scale(0)rotate(-180deg);opacity:0}60%{transform:scale(1.2)rotate(5deg);opacity:1}100%{transform:scale(1)rotate(0);opacity:1}}
@keyframes burnPulse{0%,100%{box-shadow:0 0 4px #ff4400 inset}50%{box-shadow:0 0 14px #ff8800 inset}}
@keyframes poisonPulse{0%,100%{box-shadow:0 0 4px #aa44cc inset}50%{box-shadow:0 0 12px #cc66ff inset}}
@keyframes freezePulse{0%,100%{box-shadow:0 0 6px #88ccff inset}50%{box-shadow:0 0 14px #aaddff inset}}
.shake{animation:shake .5s ease;}
.card-in{animation:cardIn .4s cubic-bezier(.175,.885,.32,1.275) both;}
.legendary{animation:rainbow 2s linear infinite;}
.dmg-num{position:absolute;font-size:22px;font-weight:bold;animation:dmgFloat 1s ease forwards;pointer-events:none;z-index:50;text-shadow:0 0 8px currentColor;}
.slot{width:70px;height:98px;border:2px dashed #1a3a6a;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:border-color .15s;}
.slot.occ{border-style:solid;border-color:#3a6aaa;}
.slot.sel{border-color:#f0c040!important;box-shadow:0 0 10px #f0c04088;}
.slot.atk-ready{border-color:#ff8800;box-shadow:0 0 8px #ff880066;}
.slot.atk-used{border-color:#333;opacity:.55;}
.slot.empty-ok{border-color:#44aa44;border-style:dashed;}
.slot.direct{border-color:#ff3030;animation:pulse .5s infinite;color:#ff3030;font-size:9px;text-align:center;flex-direction:column;}
.card{width:66px;height:94px;border-radius:3px;overflow:hidden;display:flex;flex-direction:column;align-items:center;position:relative;flex-shrink:0;}
.card-name{width:100%;font-size:6px;font-weight:bold;text-align:center;padding:1px 2px;overflow:hidden;white-space:nowrap;color:#f0e0a0;}
.card-type{font-size:6.5px;line-height:1.3;}
.card-stats{position:absolute;bottom:0;width:100%;font-size:6.5px;padding:1px 3px;background:rgba(0,0,0,.9);display:flex;justify-content:space-between;}
.card-mana{position:absolute;top:0;left:0;background:rgba(0,0,40,.88);font-size:7px;padding:1px 4px;border-radius:0 0 4px 0;color:#88aaff;font-weight:bold;}
.card-rarity{position:absolute;top:0;right:0;background:rgba(0,0,0,.7);font-size:5px;padding:1px 2px;border-radius:0 0 0 3px;line-height:1;}
.card-evo{position:absolute;top:13px;left:2px;font-size:8px;color:#88ff88;}
.card-sick{position:absolute;inset:0;background:rgba(0,0,60,.65);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;color:#88aaff;}
.card-used{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:14px;color:#ff5555;}
.card-spell{border:2px solid #88aaff!important;}
.card-status{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-size:10px;pointer-events:none;line-height:1;}
.s-burn{animation:burnPulse 1s infinite;}
.s-poison{animation:poisonPulse 1s infinite;}
.s-freeze{animation:freezePulse 1s infinite;}
.btn{background:#080820;border:2px solid #2a4a8a;color:#7a9adf;font-size:11px;padding:5px 11px;border-radius:3px;letter-spacing:1px;transition:all .15s;}
.btn:hover:not(:disabled){border-color:#8aaae0;color:#bbd;background:#0a1a3a;}
.btn:disabled{opacity:.25;cursor:default;}
.field{display:flex;gap:5px;justify-content:center;padding:5px;background:rgba(0,30,70,.3);border:1px solid #1a3a6a;border-radius:4px;min-height:106px;}
.lp-row{display:flex;align-items:center;gap:6px;padding:3px 8px;background:rgba(0,0,0,.45);border:1px solid #111;border-radius:3px;}
.hp-track{flex:1;height:6px;background:#200;border-radius:3px;}
.hp-fill{height:100%;border-radius:3px;transition:width .4s;}
.mana-row{display:flex;align-items:center;gap:6px;padding:2px 8px;background:rgba(0,0,30,.4);border:1px solid #113;border-radius:3px;}
.hand-area{display:flex;gap:4px;padding:5px;background:rgba(0,25,0,.3);border:1px solid #1a5a1a;border-radius:4px;min-height:106px;overflow-x:auto;}
.log{font-size:9.5px;color:#70b870;padding:3px 8px;background:rgba(0,0,0,.5);border:1px solid #1a3a1a;border-radius:3px;height:52px;overflow-y:auto;line-height:1.6;}
.phase-tag{font-size:9px;padding:2px 7px;border-radius:2px;border:1px solid #222;color:#333;}
.phase-tag.on{border-color:#f0c040;color:#f0c040;background:rgba(240,192,0,.08);}
.round-row{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:3px;margin:2px 0;font-size:11px;}
.round-row.done{color:#88ff88;background:rgba(0,50,0,.3);}
.round-row.curr{color:#f0c040;background:rgba(50,40,0,.4);border:1px solid #f0c04044;}
.round-row.nxt{color:#445544;}


.card-mini{background:#0d0d1a;border:2px solid #333;border-radius:8px;padding:6px;cursor:pointer;position:relative;transition:transform .15s;text-align:center;}
.card-mini:hover{transform:scale(1.05);}
.card-mini-in{box-shadow:0 0 8px #44ff8866;}
.deck-cnt{position:absolute;top:2px;right:4px;background:#f0c000;color:#000;border-radius:4px;font-size:.65em;padding:0 3px;font-weight:bold;}
.field-slot{background:#0d0d1a;border:2px solid #222;border-radius:8px;padding:6px;min-height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:default;transition:all .2s;overflow:visible;}
.field-slot.can-atk{border-color:#f0c000;cursor:pointer;animation:pulse 1.5s infinite;}
.field-slot.summoning{opacity:.6;}
.hand-card{background:#0d0d1a;border:2px solid #333;border-radius:8px;padding:6px;cursor:pointer;min-width:72px;display:inline-flex;flex-direction:column;align-items:center;transition:transform .15s;}
.hand-card:hover{transform:translateY(-4px);}
.hand-card.selected{border-color:#f0c000;box-shadow:0 0 10px #f0c00066;}
.hand-card.unaffordable{opacity:.5;}
.mana-pip{width:12px;height:12px;border-radius:50%;background:#222;border:1px solid #333;transition:background .3s;}
.mana-pip.mana-on{background:#44aaff;box-shadow:0 0 4px #44aaff;}
.btn{padding:8px 14px;border:none;border-radius:8px;font-weight:bold;font-size:.85em;cursor:pointer;transition:all .15s;}
.btn-main{background:#f0c000;color:#000;}
.btn-main:hover{background:#ffd700;}
.btn-alt{background:#1a1a2e;color:#aaa;border:1px solid #333;}
.btn-alt:hover{background:#22223a;color:#fff;}
.btn-sm{padding:5px 10px;font-size:.8em;}
.btn-tiny{padding:3px 7px;font-size:.72em;background:#111;color:#888;border:1px solid #222;border-radius:5px;cursor:pointer;}
.btn-tiny.btn-main{background:#f0c000;color:#000;border:none;}
.beaten{opacity:.7;}
.card-list-item{background:#0d0d1a;border:1px solid #222;border-radius:8px;padding:12px;display:flex;gap:12px;align-items:center;cursor:pointer;margin-bottom:6px;transition:background .15s;}
.card-list-item:hover{background:#111;}
.pdx-card{background:#0d0d1a;border:1px solid #222;border-radius:6px;padding:6px;display:flex;flex-direction:column;align-items:center;}
.pdx-locked{opacity:.5;}
.status-icons{font-size:.75em;}
@keyframes pulse{0%,100%{box-shadow:0 0 6px #f0c00066}50%{box-shadow:0 0 14px #f0c000aa}}


/* ===================== 16-BIT VISUAL UPGRADE ===================== */

/* === FIELD SPRITES: 2x scale for 16-bit size === */
.card-sprite-field{
  image-rendering:pixelated!important;
  transform:scale(1.8);
  transform-origin:center;
  margin:10px 0;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.8));
  pointer-events:none;
}

/* === TYPE-COLORED SPRITE GLOW === */
.field-slot-fire .card-sprite-field  { filter:drop-shadow(0 0 6px #ff4400) drop-shadow(0 2px 4px rgba(0,0,0,.8)); }
.field-slot-water .card-sprite-field { filter:drop-shadow(0 0 6px #0088ff) drop-shadow(0 2px 4px rgba(0,0,0,.8)); }
.field-slot-grass .card-sprite-field { filter:drop-shadow(0 0 6px #00cc44) drop-shadow(0 2px 4px rgba(0,0,0,.8)); }
.field-slot-electric .card-sprite-field { filter:drop-shadow(0 0 6px #ffcc00) drop-shadow(0 2px 4px rgba(0,0,0,.8)); }
.field-slot-psychic .card-sprite-field { filter:drop-shadow(0 0 6px #ff44ff) drop-shadow(0 2px 4px rgba(0,0,0,.8)); }
.field-slot-ghost .card-sprite-field  { filter:drop-shadow(0 0 6px #8844ff) drop-shadow(0 2px 4px rgba(0,0,0,.8)); }
.field-slot-dragon .card-sprite-field { filter:drop-shadow(0 0 6px #4466ff) drop-shadow(0 2px 4px rgba(0,0,0,.8)); }
.field-slot-ice .card-sprite-field    { filter:drop-shadow(0 0 6px #88eeff) drop-shadow(0 2px 4px rgba(0,0,0,.8)); }

/* === BREATHING ANIMATION (4 frames) === */
@keyframes breathe{
  0%,100%{transform:scale(1.8) translateY(0);}
  25%{transform:scale(1.84) translateY(-1px);}
  50%{transform:scale(1.82) translateY(-2px);}
  75%{transform:scale(1.81) translateY(-1px);}
}
.card-sprite-field{ animation:breathe 2.8s ease-in-out infinite; }
.card-sprite-field.resting{ animation:none;opacity:.7;filter:grayscale(.3); }

/* === FIELD SLOT 16-BIT DESIGN === */
.field-slot{
  min-height:110px!important;
  background:linear-gradient(180deg,#0d0d2a 0%,#06061a 100%)!important;
  box-shadow:inset 0 -2px 8px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.04);
}
.field-slot:not(:empty){
  background:linear-gradient(180deg,#0f0f2e 0%,#08081e 60%,#050515 100%)!important;
}

/* === HP BAR GRADIENT === */
.hp-bar-fill-high{ background:linear-gradient(90deg,#00ff44,#44ff88)!important; }
.hp-bar-fill-mid { background:linear-gradient(90deg,#ff8800,#ffcc00)!important; }
.hp-bar-fill-low { background:linear-gradient(90deg,#ff2200,#ff6644)!important; }
.hp-bar{
  border-radius:4px!important;
  height:7px!important;
  box-shadow:0 0 4px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.1);
}

/* === HAND CARDS 16-BIT STYLE === */
.hand-card{
  background:linear-gradient(180deg,#111128 0%,#0a0a1e 100%)!important;
  box-shadow:0 3px 10px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.06)!important;
  transition:transform .15s,box-shadow .15s!important;
}
.hand-card:active{
  transform:scale(.93) translateY(2px)!important;
  box-shadow:0 1px 4px rgba(0,0,0,.8)!important;
}
.hand-card.selected{
  box-shadow:0 0 0 2px #f0c040,0 0 16px #f0c04066,0 3px 10px rgba(0,0,0,.6)!important;
}
.hand-card.unaffordable{ opacity:.45!important; }

/* === BATTLE AREA GROUND LINE === */
.battle-ground{
  height:3px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);
  margin:2px 0;
}

/* === CARD ENTRY ANIMATION === */
@keyframes cardDeal{
  0%{transform:translateY(40px) scale(.8);opacity:0;}
  70%{transform:translateY(-4px) scale(1.02);}
  100%{transform:translateY(0) scale(1);opacity:1;}
}
.hand-card{ animation:cardDeal .35s ease both; }
.hand-card:nth-child(1){animation-delay:.0s}
.hand-card:nth-child(2){animation-delay:.06s}
.hand-card:nth-child(3){animation-delay:.12s}
.hand-card:nth-child(4){animation-delay:.18s}
.hand-card:nth-child(5){animation-delay:.24s}

/* === SHINY SPRITE EFFECT === */
@keyframes shinyRainbow{
  0%{filter:drop-shadow(0 0 6px #f0c040) hue-rotate(0deg);}
  50%{filter:drop-shadow(0 0 12px #ff88ff) hue-rotate(180deg);}
  100%{filter:drop-shadow(0 0 6px #f0c040) hue-rotate(360deg);}
}
.sprite-shiny{ animation:shinyRainbow 3s linear infinite!important; }

/* === LOG AREA === */
#battle-log{
  background:linear-gradient(180deg,#050510,#080818)!important;
  border:1px solid #1a1a3a!important;
  border-radius:6px!important;
  font-size:.72em;
}

/* ================================================================= */

/* === 16-BIT GLOBAL FONT & CRT === */
body,button,.btn,h1,h2,h3{
  font-family:'Press Start 2P',monospace;
}
/* Keep normal font for long texts */
.lore-text,.card-desc,#battle-log,.pokedex-story{
  font-family:monospace!important;
  font-size:.72em!important;
  line-height:1.7!important;
}
/* CRT Scanlines overlay */
body::after{
  content:'';
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,transparent 3px,
    rgba(0,0,0,0.07) 3px,rgba(0,0,0,0.07) 4px
  );
  pointer-events:none;
  z-index:9990;
}
/* Vignette effect */
body::before{
  content:'';
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 50% 50%, transparent 60%, rgba(0,0,0,0.5) 100%);
  pointer-events:none;
  z-index:9989;
}

/* === BATTLE BACKGROUND ANIMATED === */
@keyframes bgScroll{from{background-position:0 0}to{background-position:0 -200px}}
@keyframes starFloat{0%{opacity:.2;transform:translateY(0)}50%{opacity:.8}100%{opacity:.2;transform:translateY(-10px)}}

/* === HOLOGRAPHIC CARD EFFECT === */
@keyframes holoPulse{
  0%{background-position:0% 50%;opacity:.3}
  50%{background-position:100% 50%;opacity:.6}
  100%{background-position:0% 50%;opacity:.3}
}
.holo-epic{
  position:relative;
  overflow:hidden;
}
.holo-epic::after{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg,transparent 30%,rgba(204,102,255,.2) 50%,transparent 70%);
  background-size:200% 200%;
  animation:holoPulse 2s ease infinite;
  pointer-events:none;border-radius:inherit;
}
.holo-legendary::after{
  background:linear-gradient(135deg,
    transparent 20%,rgba(255,200,0,.25) 35%,
    transparent 50%,rgba(255,100,0,.2) 65%,
    transparent 80%);
  background-size:300% 300%;
  animation:holoPulse 1.5s ease infinite;
}

/* === BETTER FIELD SLOT === */
.field-slot{
  background:linear-gradient(180deg,#0a0a22 0%,#060614 100%)!important;
  border-radius:10px!important;
  position:relative;
}
.field-slot::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,.03) 0%,transparent 50%);
  pointer-events:none;border-radius:inherit;
}

/* === HP BAR 16-BIT SEGMENTED LOOK === */
.hp-bar{
  height:8px!important;
  border-radius:2px!important;
  border:1px solid rgba(0,0,0,.4)!important;
  background:#0a0a0a!important;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.1),0 0 4px rgba(0,0,0,.5)!important;
}

/* === HAND CARD 16-BIT === */
.hand-card{
  border-radius:8px!important;
  border-width:2px!important;
}

/* === SCREEN FLASH === */
@keyframes screenFlash{0%{opacity:.5}100%{opacity:0}}
#damage-flash{
  position:fixed;inset:0;pointer-events:none;z-index:9988;
  background:#ff0000;opacity:0;
}
#heal-flash{
  position:fixed;inset:0;pointer-events:none;z-index:9988;
  background:#00ff44;opacity:0;
}

/* === FLOATING DAMAGE NUMBERS === */
@keyframes floatUp{
  0%{transform:translateY(0) scale(1.2);opacity:1;}
  60%{transform:translateY(-40px) scale(1);opacity:1;}
  100%{transform:translateY(-70px) scale(.8);opacity:0;}
}
.dmg-float{
  position:absolute;left:50%;top:30%;transform:translateX(-50%);
  font-family:'Press Start 2P',monospace;font-size:.85em;font-weight:bold;
  text-shadow:2px 2px 0 #000,-2px 2px 0 #000,2px -2px 0 #000,-2px -2px 0 #000;
  z-index:999;pointer-events:none;animation:floatUp 1.2s ease-out forwards;
  white-space:nowrap;
}

/* === SCREEN SHAKE === */
@keyframes screenShake{
  0%,100%{transform:translateX(0) rotate(0)}
  15%{transform:translateX(-8px) rotate(-.4deg)}
  30%{transform:translateX(8px) rotate(.4deg)}
  45%{transform:translateX(-6px) rotate(-.2deg)}
  60%{transform:translateX(6px) rotate(.2deg)}
  75%{transform:translateX(-4px)}
  90%{transform:translateX(4px)}
}
.screen-shake{animation:screenShake .4s ease!important;}

/* === SUPER EFFECTIVE BANNER === */
@keyframes superEffPop{
  0%{transform:translate(-50%,-50%) scale(0) rotate(-10deg);opacity:1;}
  40%{transform:translate(-50%,-50%) scale(1.2) rotate(2deg);opacity:1;}
  70%{transform:translate(-50%,-50%) scale(1) rotate(0);opacity:1;}
  100%{transform:translate(-50%,-50%) scale(1.1) rotate(0);opacity:0;}
}

/* === SUMMONING ANIMATION === */
@keyframes summonPop{
  0%{transform:scale(0) rotate(-15deg);opacity:0;}
  50%{transform:scale(1.15) rotate(3deg);opacity:1;}
  75%{transform:scale(.95) rotate(-1deg);}
  100%{transform:scale(1) rotate(0);opacity:1;}
}
.summon-anim{animation:summonPop .5s cubic-bezier(.175,.885,.32,1.275) both!important;}

/* === EVOLUTION FLASH === */
@keyframes evoFlash{
  0%{opacity:0}20%{opacity:1}50%{opacity:1}80%{opacity:.5}100%{opacity:0}
}
#evo-flash{
  position:fixed;inset:0;background:#fff;pointer-events:none;z-index:9992;opacity:0;
}

/* === KO ANIMATION === */
@keyframes koSpin{
  0%{transform:scale(1) rotate(0);opacity:1;}
  50%{transform:scale(.8) rotate(180deg) translateY(10px);opacity:.5;}
  100%{transform:scale(0) rotate(360deg) translateY(30px);opacity:0;}
}
.ko-anim .card-sprite-field{animation:koSpin .6s ease-in forwards!important;}

/* === OPENING SPLASH === */
@keyframes splashLogo{
  0%{opacity:0;transform:scale(.8);}
  30%{opacity:1;transform:scale(1.05);}
  70%{opacity:1;transform:scale(1);}
  100%{opacity:0;transform:scale(1);}
}
@keyframes splashFade{
  0%,80%{opacity:1}100%{opacity:0;pointer-events:none}
}
#splash-screen{
  position:fixed;inset:0;background:#060614;z-index:99999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  animation:splashFade 3s ease forwards;
  pointer-events:none;
}
#splash-logo{animation:splashLogo 2.5s ease forwards;}

/* === VICTORY/DEFEAT === */
@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}
@keyframes defeatDark{
  0%{opacity:0}100%{opacity:.7}
}
#victory-overlay,#defeat-overlay{
  position:fixed;inset:0;pointer-events:none;z-index:9991;
}

/* === ANIMATED MENU STARS === */
@keyframes menuStar{
  0%{transform:translateY(0) translateX(0);opacity:0}
  10%{opacity:.8}
  90%{opacity:.4}
  100%{transform:translateY(-100vh) translateX(20px);opacity:0}
}
.menu-star{
  position:absolute;border-radius:50%;
  animation:menuStar var(--dur) linear infinite;
  animation-delay:var(--delay);
}

/* === STATUS EFFECT VISUALS === */
@keyframes poisonPulse{0%,100%{box-shadow:0 0 0 0 rgba(180,0,255,0)}50%{box-shadow:0 0 12px 4px rgba(180,0,255,.6)}}
@keyframes freezeShimmer{0%,100%{filter:brightness(1) hue-rotate(0deg)}50%{filter:brightness(1.4) hue-rotate(180deg) saturate(2)}}
@keyframes paralyzeZap{0%,90%,100%{opacity:1}92%{opacity:.3}95%{opacity:.8}97%{opacity:.2}}
@keyframes burnGlow{0%,100%{box-shadow:0 0 6px #ff4400}50%{box-shadow:0 0 18px #ff8800,0 0 30px #ff4400}}

.status-poison .card-sprite-field{animation:breathe 2.8s ease-in-out infinite,poisonPulse 1.5s ease infinite!important;filter:drop-shadow(0 0 8px #aa00ff) hue-rotate(270deg)!important;}
.status-freeze .card-sprite-field{animation:freezeShimmer 2s ease infinite!important;filter:drop-shadow(0 0 10px #88eeff) saturate(0.3) brightness(1.3)!important;}
.status-paralyze .card-sprite-field{animation:paralyzeZap .3s linear infinite!important;filter:drop-shadow(0 0 8px #ffcc00)!important;}

/* Status badges floating */
.status-badge{
  position:absolute;top:2px;left:2px;
  font-size:.5em;padding:1px 4px;
  border-radius:3px;font-family:'Press Start 2P',monospace;
  z-index:5;pointer-events:none;
}

/* === LEVEL UP EFFECT === */
@keyframes lvlStarBurst{
  0%{transform:translate(-50%,-50%) scale(0) rotate(0);opacity:1}
  60%{transform:translate(-50%,-50%) scale(1.3) rotate(360deg);opacity:1}
  100%{transform:translate(-50%,-50%) scale(1.5) rotate(720deg);opacity:0}
}
@keyframes lvlNum{
  0%{transform:translate(-50%,-60%) scale(0);opacity:0}
  30%{transform:translate(-50%,-60%) scale(1.3);opacity:1}
  70%{transform:translate(-50%,-60%) scale(1);opacity:1}
  100%{transform:translate(-50%,-80%) scale(.8);opacity:0}
}

/* === RARITY GEMS ANIMATED === */
@keyframes gemPulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
@keyframes legendaryGem{
  0%{color:#ffcc00;text-shadow:0 0 4px #ff8800}
  33%{color:#ff8800;text-shadow:0 0 8px #ff4400}
  66%{color:#ff4400;text-shadow:0 0 6px #ffcc00}
  100%{color:#ffcc00;text-shadow:0 0 4px #ff8800}
}
.gem-epic{animation:gemPulse 1.5s ease infinite;color:#cc66ff!important;display:inline-block}
.gem-legendary{animation:legendaryGem 1.2s linear infinite;display:inline-block}

/* === ATTACK TRAIL === */
@keyframes trailParticle{
  0%{transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}
}
.atk-particle{
  position:fixed;width:6px;height:6px;border-radius:50%;
  pointer-events:none;z-index:9993;
  animation:trailParticle .5s ease-out forwards;
}

/* === HAND CARD TYPE FAIXA === */
.hand-card-faixa{
  position:absolute;top:0;left:0;right:0;height:4px;
  border-radius:6px 6px 0 0;
  opacity:.9;
}

/* === FIELD SLOT TEXTURE === */
@keyframes fieldTextureFire{0%,100%{background-position:0 0}50%{background-position:0 -20px}}
@keyframes fieldTextureWater{0%,100%{background-position:0 0}50%{background-position:20px 0}}

/* Field slot type glow - inset box-shadow for visible effect */
.field-slot-fire   {box-shadow:inset 0 0 20px rgba(255,80,0,.25),inset 0 -3px 0 rgba(255,80,0,.5)!important;background:linear-gradient(180deg,#1a0800 0%,#060614 100%)!important;}
.field-slot-water  {box-shadow:inset 0 0 20px rgba(0,120,255,.25),inset 0 -3px 0 rgba(0,120,255,.5)!important;background:linear-gradient(180deg,#000818 0%,#060614 100%)!important;}
.field-slot-grass  {box-shadow:inset 0 0 20px rgba(0,180,60,.22),inset 0 -3px 0 rgba(0,180,60,.5)!important;background:linear-gradient(180deg,#00100a 0%,#060614 100%)!important;}
.field-slot-electric{box-shadow:inset 0 0 20px rgba(255,200,0,.2),inset 0 -3px 0 rgba(255,200,0,.5)!important;background:linear-gradient(180deg,#140e00 0%,#060614 100%)!important;}
.field-slot-psychic {box-shadow:inset 0 0 20px rgba(255,60,255,.2),inset 0 -3px 0 rgba(255,60,255,.5)!important;background:linear-gradient(180deg,#120012 0%,#060614 100%)!important;}
.field-slot-ghost  {box-shadow:inset 0 0 20px rgba(120,30,200,.25),inset 0 -3px 0 rgba(120,30,200,.5)!important;background:linear-gradient(180deg,#080014 0%,#060614 100%)!important;}
.field-slot-dragon {box-shadow:inset 0 0 20px rgba(50,80,255,.22),inset 0 -3px 0 rgba(50,80,255,.5)!important;background:linear-gradient(180deg,#000818 0%,#060614 100%)!important;}
.field-slot-ice    {box-shadow:inset 0 0 20px rgba(100,220,255,.2),inset 0 -3px 0 rgba(100,220,255,.5)!important;background:linear-gradient(180deg,#00101a 0%,#060614 100%)!important;}
.field-slot-rock   {box-shadow:inset 0 0 20px rgba(180,140,80,.2),inset 0 -3px 0 rgba(180,140,80,.4)!important;background:linear-gradient(180deg,#100a00 0%,#060614 100%)!important;}
.field-slot-poison {box-shadow:inset 0 0 20px rgba(180,0,255,.2),inset 0 -3px 0 rgba(180,0,255,.4)!important;background:linear-gradient(180deg,#0e0018 0%,#060614 100%)!important;}
.field-slot-fighting{box-shadow:inset 0 0 20px rgba(220,60,0,.2),inset 0 -3px 0 rgba(220,60,0,.4)!important;background:linear-gradient(180deg,#180400 0%,#060614 100%)!important;}
.field-slot-normal {box-shadow:inset 0 0 10px rgba(160,160,200,.12)!important;}

/* === WEATHER VISUAL EFFECTS === */
@keyframes rainDrop{0%{transform:translateY(-10px);opacity:0}10%{opacity:.7}90%{opacity:.5}100%{transform:translateY(100vh);opacity:0}}
@keyframes sunPulse{0%,100%{opacity:.06}50%{opacity:.14}}
@keyframes thunder{0%,88%,100%{opacity:0}89%{opacity:.12}91%{opacity:.04}93%{opacity:.08}}
@keyframes snowFall{0%{transform:translateY(-10px) rotate(0);opacity:0}10%{opacity:.8}90%{opacity:.5}100%{transform:translateY(100vh) rotate(360deg);opacity:0}}

.weather-overlay{position:fixed;inset:0;pointer-events:none;z-index:9987;overflow:hidden;}
.rain-drop{position:absolute;width:2px;border-radius:2px;background:linear-gradient(180deg,transparent,#44aaff);animation:rainDrop var(--dur) linear infinite;animation-delay:var(--delay);}
.sun-glow{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,#ff880033 0%,transparent 60%);animation:sunPulse 2s ease infinite;}
.thunder-flash{position:absolute;inset:0;background:rgba(255,240,100,.06);animation:thunder 3s linear infinite;animation-delay:var(--delay);}
.snow-flake{position:absolute;color:#aaeeff;font-size:10px;animation:snowFall var(--dur) linear infinite;animation-delay:var(--delay);}

@keyframes rainbowSlide{0%{background-position:0% 50%}100%{background-position:300% 50%}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

@keyframes letterBounce{0%{transform:translateY(0) scale(1)}100%{transform:translateY(-4px) scale(1.1)}}
@keyframes glitchX{
  0%,90%,100%{transform:translateX(0);opacity:0}
  91%{transform:translateX(-3px);opacity:.4}
  93%{transform:translateX(2px);opacity:.2}
  95%{transform:translateX(-1px);opacity:.3}
  97%{transform:translateX(0);opacity:0}
}

@keyframes boltFall{
  0%{opacity:0;transform:scaleY(0) translateX(0)}
  5%{opacity:1;transform:scaleY(.3) translateX(-3px)}
  10%{opacity:1;transform:scaleY(.6) translateX(2px)}
  15%{opacity:1;transform:scaleY(1) translateX(-2px)}
  30%{opacity:.6}
  40%{opacity:0;transform:scaleY(1)}
  100%{opacity:0}
}
.lightning-bolt{
  position:absolute;top:0;width:3px;
  background:linear-gradient(180deg,#fff9aa,#ffee00,#ffcc00,transparent);
  border-radius:2px;
  box-shadow:0 0 8px #ffdd00,0 0 20px #ffaa00;
  transform-origin:top center;
  animation:boltFall var(--dur) var(--delay) ease-in infinite;
  opacity:0;
}

@keyframes fireRise{
  0%{transform:translateY(0) scale(1) rotate(0deg);opacity:1;}
  50%{transform:translateY(-60vh) scale(1.3) rotate(15deg);opacity:.8;}
  100%{transform:translateY(-110vh) scale(.5) rotate(-10deg);opacity:0;}
}
@keyframes sunBurst{
  0%{transform:translate(-50%,-50%) scale(0);opacity:1;}
  50%{transform:translate(-50%,-50%) scale(1.5);opacity:.6;}
  100%{transform:translate(-50%,-50%) scale(3);opacity:0;}
}
@keyframes sunRay{
  0%{opacity:0;transform:rotate(var(--angle)) scaleY(0);}
  30%{opacity:.8;transform:rotate(var(--angle)) scaleY(1);}
  70%{opacity:.5;transform:rotate(var(--angle)) scaleY(1.2);}
  100%{opacity:0;transform:rotate(var(--angle)) scaleY(0);}
}
.fire-particle{
  position:fixed;font-size:var(--size);pointer-events:none;z-index:9996;
  animation:fireRise var(--dur) ease-out forwards;
  animation-delay:var(--delay);
}
.sun-burst-ring{
  position:fixed;top:50%;left:50%;
  width:200px;height:200px;margin:-100px 0 0 -100px;
  border-radius:50%;border:4px solid #ff8800;
  animation:sunBurst .8s ease-out forwards;
  pointer-events:none;z-index:9996;
}
.sun-ray{
  position:fixed;top:50%;left:50%;
  width:4px;height:80px;margin-left:-2px;
  background:linear-gradient(0deg,#ffcc00,transparent);
  transform-origin:bottom center;
  animation:sunRay .9s ease-out forwards;
  pointer-events:none;z-index:9995;
}

/* === OFFICIAL POKEAPI SPRITES IN FIELD === */
@keyframes breatheImg{
  0%,100%{transform:translateY(0) scale(1);}
  25%{transform:translateY(-3px) scale(1.04);}
  50%{transform:translateY(-5px) scale(1.03);}
  75%{transform:translateY(-3px) scale(1.02);}
}
.field-sprite-official{
  animation:breatheImg 2.8s ease-in-out infinite;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.7));
  margin:2px auto;
}
.field-sprite-official.resting-img{
  animation:none;
  opacity:.7;
  filter:grayscale(.4) drop-shadow(0 2px 4px rgba(0,0,0,.5));
}
.field-sprite-official.sprite-shiny{
  animation:breatheImg 2.8s ease-in-out infinite, shinyRainbow 3s linear infinite;
}

/* === ICE FREEZE OVERLAY === */
@keyframes iceFormation{
  0%{opacity:0;transform:scale(.8)}
  30%{opacity:1;transform:scale(1.05)}
  100%{opacity:1;transform:scale(1)}
}
@keyframes iceShimmer{
  0%,100%{background-position:0 0}50%{background-position:100% 100%}
}
.freeze-overlay{
  position:absolute;inset:0;border-radius:inherit;pointer-events:none;z-index:5;
  background:linear-gradient(135deg,rgba(100,220,255,.35),rgba(200,240,255,.2),rgba(100,200,255,.3));
  border:2px solid rgba(150,230,255,.6);
  animation:iceFormation .5s ease forwards;
  box-shadow:inset 0 0 20px rgba(100,200,255,.4),0 0 15px rgba(100,200,255,.3);
}
.freeze-overlay::before{
  content:'❄';position:absolute;top:4px;left:6px;font-size:1em;opacity:.9;
  animation:gemPulse 1s ease infinite;
}
.freeze-overlay::after{
  content:'❄';position:absolute;bottom:4px;right:6px;font-size:.8em;opacity:.7;
  animation:gemPulse 1.3s ease infinite;
}

/* === MODERNIZED BATTLE ARENA === */
.field-slot{
  border-radius:12px!important;
  transition:all .2s,box-shadow .1s!important;
}
.field-slot:hover{box-shadow:0 0 15px rgba(255,255,255,.1)!important;}

/* === ATTACK HIT FLASH === */
@keyframes hitFlash{
  0%{opacity:0}20%{opacity:.7}40%{opacity:.3}60%{opacity:.5}80%{opacity:.2}100%{opacity:0}
}
.hit-flash{
  position:absolute;inset:0;border-radius:inherit;pointer-events:none;z-index:6;
  background:#ffffff;animation:hitFlash .3s ease forwards;
}

/* ========== MODERN BATTLE ARENA ========== */

/* Arena container */
#battle-arena{
  background:linear-gradient(180deg,#0a0a2e 0%,#080818 100%);
  border-radius:12px;
  position:relative;
  overflow:visible;
  padding:4px;
}

/* Enemy platform */
.enemy-platform{
  background:linear-gradient(180deg,#0d0d30 0%,#080825 100%);
  border:1px solid rgba(255,80,80,.15);
  border-radius:10px 10px 4px 4px;
  padding:6px 4px 4px;
  position:relative;
  box-shadow:inset 0 -3px 12px rgba(255,60,60,.08);
}
.enemy-platform::after{
  content:'';position:absolute;bottom:0;left:10%;right:10%;height:2px;
  background:linear-gradient(90deg,transparent,rgba(255,80,80,.3),transparent);
}

/* Player platform */
.player-platform{
  background:linear-gradient(180deg,#080825 0%,#0d0d30 100%);
  border:1px solid rgba(80,180,255,.15);
  border-radius:4px 4px 10px 10px;
  padding:4px 4px 6px;
  position:relative;
  box-shadow:inset 0 3px 12px rgba(60,120,255,.08);
}
.player-platform::before{
  content:'';position:absolute;top:0;left:10%;right:10%;height:2px;
  background:linear-gradient(90deg,transparent,rgba(80,180,255,.3),transparent);
}

/* Center divider */
.arena-divider{
  height:3px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),rgba(255,255,255,.15),rgba(255,255,255,.08),transparent);
  margin:2px 0;
  position:relative;
}
.arena-divider::after{
  content:'⚔';position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  font-size:12px;opacity:.3;
  background:#060614;padding:0 6px;
}

/* Field slot modernized */
.field-slot{
  border-radius:10px!important;
  min-height:120px!important;
  background:linear-gradient(180deg,rgba(255,255,255,.03) 0%,transparent 100%)!important;
  box-shadow:0 2px 8px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.05)!important;
  position:relative!important;
  overflow:visible!important;
}

/* === TYPE-SPECIFIC PARTICLE SHAPES === */
@keyframes fireBurst{
  0%{transform:translate(-50%,-50%) scale(0) rotate(0);opacity:1}
  60%{transform:translate(-50%,-50%) scale(1.2) rotate(180deg);opacity:.8}
  100%{transform:translate(-50%,-50%) scale(2) rotate(360deg);opacity:0}
}
@keyframes waterDrop{
  0%{transform:translateY(0) scaleX(1);opacity:1}
  100%{transform:translateY(40px) scaleX(.3);opacity:0}
}
@keyframes electricZap{
  0%,20%,40%,60%,80%{opacity:1}10%,30%,50%,70%,90%{opacity:.2}100%{opacity:0}
}
@keyframes leafSpin{
  0%{transform:rotate(0) translateY(0);opacity:1}
  100%{transform:rotate(360deg) translateY(-50px);opacity:0}
}
@keyframes psychicRing{
  0%{transform:translate(-50%,-50%) scale(0);opacity:.8;border-radius:50%}
  100%{transform:translate(-50%,-50%) scale(3);opacity:0;border-radius:50%}
}
@keyframes shadowWisp{
  0%{transform:translateY(0) scale(1);opacity:.7}
  50%{transform:translateY(-20px) scale(1.3);opacity:.4}
  100%{transform:translateY(-40px) scale(.5);opacity:0}
}
@keyframes rockFragment{
  0%{transform:translate(0,0) rotate(0);opacity:1}
  100%{transform:translate(var(--rx),var(--ry)) rotate(720deg);opacity:0}
}
@keyframes iceSpike{
  0%{transform:scaleY(0) translateX(-50%);opacity:1}
  50%{transform:scaleY(1) translateX(-50%);opacity:1}
  100%{transform:scaleY(.5) translateX(-50%);opacity:0}
}

.type-particle{position:fixed;pointer-events:none;z-index:9994;}

/* ========================================= */

/* ======= CLEAN BATTLE EFFECTS ======= */

/* Attack flash on target slot */
@keyframes slotFlash{
  0%{box-shadow:var(--type-shadow),inset 0 0 0 0 rgba(255,255,255,0)}
  30%{box-shadow:0 0 30px var(--type-color),0 0 60px var(--type-color),inset 0 0 20px rgba(255,255,255,.15)}
  100%{box-shadow:var(--type-shadow)}
}
.slot-hit{animation:slotFlash .5s ease forwards!important;}

/* Attacker glow when attacking */
@keyframes atkPulse{
  0%,100%{filter:var(--base-filter)}
  50%{filter:var(--base-filter) brightness(1.5) saturate(2)}
}
.slot-attacking{animation:atkPulse .4s ease!important;}

/* Type-colored damage number */
.dmg-float{
  font-family:'Press Start 2P',monospace!important;
  font-size:.9em!important;
  font-weight:900!important;
  text-shadow:2px 2px 0 #000,-2px 2px 0 #000,2px -2px 0 #000,-2px -2px 0 #000,0 0 20px currentColor!important;
  letter-spacing:.05em!important;
}

/* Arena */
.enemy-platform{border:1px solid rgba(255,60,60,.2);background:rgba(255,30,0,.06)!important;}
.player-platform{border:1px solid rgba(60,120,255,.2);background:rgba(30,80,255,.06)!important;}
.arena-divider{background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent)!important;margin:3px 0!important;}
.arena-divider::after{color:rgba(255,255,255,.15)!important;}

/* Cleaner field slots */
.field-slot{
  background:rgba(255,255,255,.03)!important;
  border:1px solid rgba(255,255,255,.08)!important;
  border-radius:10px!important;
  transition:box-shadow .15s!important;
  min-height:100px!important;
}
.field-slot-fire   {--type-color:#ff4400;--type-shadow:0 0 8px rgba(255,68,0,.3),inset 0 -2px 0 rgba(255,68,0,.4);}
.field-slot-water  {--type-color:#0088ff;--type-shadow:0 0 8px rgba(0,136,255,.3),inset 0 -2px 0 rgba(0,136,255,.4);}
.field-slot-grass  {--type-color:#00cc44;--type-shadow:0 0 8px rgba(0,204,68,.3),inset 0 -2px 0 rgba(0,204,68,.4);}
.field-slot-electric{--type-color:#ffcc00;--type-shadow:0 0 8px rgba(255,204,0,.3),inset 0 -2px 0 rgba(255,204,0,.4);}
.field-slot-psychic{--type-color:#ff44cc;--type-shadow:0 0 8px rgba(255,68,204,.3),inset 0 -2px 0 rgba(255,68,204,.4);}

/* Apply base shadow to all occupied slots */
.field-slot:not(:empty){box-shadow:var(--type-shadow,0 0 6px rgba(255,255,255,.1));}
/* ====================================== */

/* === SHIELD BUBBLE VISUAL === */
@keyframes shieldPulse{
  0%,100%{opacity:.55;transform:scale(1)}
  50%{opacity:.75;transform:scale(1.02)}
}
@keyframes shieldShimmer{
  0%{background-position:0% 50%}100%{background-position:200% 50%}
}
.shield-bubble{
  position:absolute;inset:-4px;
  border-radius:12px;
  border:2px solid rgba(120,200,255,.7);
  background:linear-gradient(135deg,
    rgba(100,180,255,.08) 0%,
    rgba(200,240,255,.15) 50%,
    rgba(100,180,255,.08) 100%);
  background-size:200% 200%;
  animation:shieldPulse 1.8s ease infinite, shieldShimmer 3s linear infinite;
  pointer-events:none;z-index:7;
  box-shadow:0 0 12px rgba(100,180,255,.4),inset 0 0 8px rgba(200,240,255,.15);
}
.shield-bubble::before{
  content:'🛡';position:absolute;top:4px;right:6px;
  font-size:.7em;opacity:.8;
  filter:drop-shadow(0 0 4px #88ddff);
}

/* === EPIC EVOLUTION EFFECT === */
@keyframes evoGlow{
  0%{filter:brightness(1) drop-shadow(0 0 0 white)}
  40%{filter:brightness(3) drop-shadow(0 0 20px white) drop-shadow(0 0 40px white)}
  70%{filter:brightness(8) drop-shadow(0 0 40px white) saturate(0)}
  100%{filter:brightness(1) drop-shadow(0 0 0 white)}
}
@keyframes evoBurst{
  0%{transform:translate(-50%,-50%) scale(0);opacity:1}
  60%{transform:translate(-50%,-50%) scale(1.5);opacity:.8}
  100%{transform:translate(-50%,-50%) scale(3);opacity:0}
}
@keyframes evoRing{
  0%{transform:translate(-50%,-50%) scale(0);opacity:.9;border-width:6px}
  100%{transform:translate(-50%,-50%) scale(2.5);opacity:0;border-width:1px}
}
@keyframes evoStar{
  0%{transform:translate(-50%,-50%) scale(0) rotate(0);opacity:1}
  50%{transform:translate(-50%,-50%) scale(1) rotate(180deg);opacity:1}
  100%{transform:translate(-50%,-50%) scale(0) rotate(360deg);opacity:0}
}
.evo-slot-anim .field-sprite-official,
.evo-slot-anim canvas{
  animation:evoGlow .9s ease forwards!important;
}

#hand-area{position:relative;}

.hand-card{
  min-width:74px!important;max-width:84px!important;
  min-height:95px!important;
  border-radius:8px!important;
  border-width:2px!important;
  cursor:pointer!important;
  position:relative!important;
  transition:transform .18s ease,box-shadow .18s ease!important;
  transform-origin:bottom center!important;
  margin:0 2px!important;
  background:linear-gradient(160deg,#141432 0%,#0a0a20 60%,#0d0d28 100%)!important;
  box-shadow:0 4px 12px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.06)!important;
}



/* Card preview overlay when selected */
#card-preview{
  position:fixed;bottom:160px;left:50%;transform:translateX(-50%);
  width:160px;
  background:#0a0a2a;
  border:2px solid var(--preview-color,#f0c040);
  border-radius:12px;padding:10px;
  text-align:center;z-index:99;
  box-shadow:0 0 30px rgba(0,0,0,.8),0 0 20px var(--preview-color,#f0c040)44;
  pointer-events:none;
  animation:fadeIn .15s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) scale(.9)}to{opacity:1;transform:translateX(-50%) scale(1)}}

/* === UPGRADED CARD VISUALS === */
@keyframes shimmerGold{
  0%{background-position:200% 0}100%{background-position:-200% 0}
}
@keyframes shimmerRainbow{
  0%{filter:hue-rotate(0deg) brightness(1.2)}
  50%{filter:hue-rotate(180deg) brightness(1.4)}
  100%{filter:hue-rotate(360deg) brightness(1.2)}
}
@keyframes glowPulseUp{
  0%,100%{box-shadow:0 0 8px gold,0 0 20px gold}
  50%{box-shadow:0 0 16px gold,0 0 40px gold,0 0 60px gold}
}
.upgrade-1{
  border-color:#f0c040!important;
  background:linear-gradient(135deg,#1a1000 0%,#0a0800 50%,#1a1000 100%)!important;
  box-shadow:0 0 8px #f0c04066!important;
}
.upgrade-2{
  border-color:#cc66ff!important;
  background:linear-gradient(135deg,#1a0028 0%,#080018 50%,#1a0028 100%)!important;
  box-shadow:0 0 12px #cc66ff88!important;
}
.upgrade-3{
  border-color:#ff4444!important;
  animation:glowPulseUp 2s ease infinite!important;
  background:linear-gradient(135deg,#200000 0%,#100000 50%,#200000 100%)!important;
}
.upgrade-3 img,.upgrade-3 canvas{
  animation:shimmerRainbow 3s linear infinite!important;
}

/* === MOBILE FIXES === */
button, .btn, .hand-card, .field-slot {
  touch-action: manipulation; /* prevents double-tap zoom */
  -webkit-tap-highlight-color: transparent;
}
/* Prevent text overflow on small screens */
.hand-card {
  word-break: break-word;
}
/* Fix font sizes on very small screens */
@media (max-width: 380px) {
  #app { font-size: 11px !important; }
  .hand-card { min-width: 68px !important; max-width: 72px !important; }
}
/* Prevent pull-to-refresh interfering */
body {
  overscroll-behavior-y: contain;
}

@media (max-width:400px){
  /* Pokédex compacto em telas pequenas */
  #app { padding:6px !important; }
}

/* === BATTLE SCREEN MOBILE FIX === */
/* Force everything to fit in viewport */
#app-inner {
  display: flex;
  flex-direction: column;
  padding: 4px !important;
}

/* Field slots compact on mobile */
.field-slot {
  min-height: 95px !important;
  font-size: 13px;
}

/* HP bars compact */
.hp-bar-wrap { height: 6px !important; }

/* Divider no margin */
.arena-divider { margin: 1px 0 !important; }

/* Enemy/player platforms no padding waste */
.enemy-platform { padding: 4px 3px 2px !important; }
.player-platform { padding: 2px 3px 4px !important; }

/* Hand cards smaller on very small screens */
@media (max-height: 680px) {
  .field-slot { min-height: 82px !important; }
  #hand-area { padding: 2px !important; }
  .hand-card { height: 108px !important; }
  .field-sprite-official { width: 64px !important; height: 64px !important; }
}

/* Prevent any overflow */
.enemy-platform, .player-platform {
  overflow: hidden;
}

/* ===== MOBILE BATTLE LAYOUT FIX ===== */
@media (max-width: 480px) {
  /* Field slots muito menores no celular */
  .field-slot {
    min-height: 80px !important;
    padding: 2px !important;
  }
  .field-slot img.field-sprite-official {
    width: 56px !important;
    height: 56px !important;
  }
  /* HP bars mais finas */
  .hp-bar-wrap { height: 5px !important; }
  /* Texto do slot menor */
  .field-slot > div { font-size: .55em !important; }

  /* Cartas da mão: scroll horizontal suave */
  #hand-area {
    overflow-x: scroll !important;
    overflow-y: visible !important;
    -webkit-overflow-scrolling: touch !important;
    scrollbar-width: none !important;
  }
  #hand-area::-webkit-scrollbar { display: none; }
  #hand-area > div {
    padding-bottom: 4px !important;
  }

  /* Cards menores no celular */
  #hand-area .hand-card-wrap,
  #hand-area > div > div {
    min-width: 90px !important;
    width: 90px !important;
    height: 136px !important;
  }

  /* Gap entre slots do campo menor */
  .enemy-platform > div,
  .player-platform > div {
    gap: 3px !important;
  }

  /* Plataformas bem compactas */
  .enemy-platform { padding: 2px !important; }
  .player-platform { padding: 2px !important; }
  .arena-divider { margin: 1px 0 !important; }

  /* Log mínimo */
  #battle-log { max-height: 40px !important; font-size: .6em !important; }
  
  /* HP section compacta */
  .hp-section { padding: 2px 0 !important; }
}

/* ===== SCROLL HORIZONTAL CARTAS ===== */
#hand-area {
  overflow-x: auto;
  overflow-y: visible;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: 4px;
}
#hand-area::-webkit-scrollbar { display: none; }

const DEFAULT_IDS=['charmander','charmeleon','charizard','squirtle','wartortle','blastoise','bulbasaur','ivysaur','venusaur','pikachu','raichu','jolteon','mewtwo','dragonite','gengar','snorlax','gyarados','alakazam','machamp','arcanine','lapras','eevee','vaporeon','flareon'];
const SPELL_IDS=['potion','pokeball','xattack','shield','toxicmist','icebeam','energycard','drawcard'];
const UNLOCK_IDS=DB.filter(c=>!c.spell&&!DEFAULT_IDS.includes(c.id)).map(c=>c.id);
const byId=id=>DB.find(c=>c.id===id);
const mkCard=id=>{
  const b=byId(id);if(!b)return null;
  const LEGENDARY_IDS=['mewtwo','mew','lugia','ho_oh','zapdos','moltres','articuno'];
  const cost=b.cost||(LEGENDARY_IDS.includes(b.id)?8:MANA_COST[b.r||0]);
  const sv_=getSave();
  const ulv=(sv_.upgrades||{})[id]||0;
  const shiny=(sv_.shinies||[]).includes(id);
  const atkBonus=ulv*100; // upgrade: +100 ATK por nível (máx 1 nível)
  const defBonus=ulv*100; // upgrade: +100 DEF por nível
  // Shiny é cosmético - sem bônus de stats
  return{...b,uid:Math.random().toString(36).slice(2,9),
    hp:(b.def||500)+defBonus,maxHp:(b.def||500)+defBonus,
    atk:(b.atk||100)+atkBonus,def:(b.def||500)+defBonus,
    cost,status:{},shiny,upgradeLevel:ulv};

  const defaultIds=['charmander','charmeleon','charizard','squirtle','wartortle','blastoise','bulbasaur','ivysaur','venusaur','pikachu','raichu','jolteon','mewtwo','dragonite','gengar','snorlax','gyarados','alakazam','machamp','arcanine','lapras','eevee','vaporeon','flareon'];
  const spellIds=['potion','pokeball','energycard','xattack','shield','toxicmist','icebeam','drawcard'];
  const avail=[...new Set([...defaultIds,...(sv.unlocked||[]),...spellIds])];
  const cnt=id=>deck.filter(x=>x===id).length;
  const deck=[];

  // Step 1: Add template cards that player owns
  // But for evo-only cards, ensure their base is included first
  const addedIds=new Set();
  for(const id of tpl.ids){
    if(deck.length>=20)break;
    const b=byId(id);if(!b)continue;
    if(!avail.includes(id))continue;
    // If evo-only, make sure base is in deck first
    if(b.evoOnly&&b.ef){
      const base=byId(b.ef);
      if(base&&avail.includes(b.ef)&&cnt(b.ef)<3){
        deck.push(b.ef); // add base first
      } else if(!base||!avail.includes(b.ef)){
        continue; // skip if base not available
      }
    }
    if(cnt(id)<3)deck.push(id);
    addedIds.add(id);
  }

  // Step 2: Fill with same-type Pokemon (up to 3 copies each, loop until full)
  if(deck.length<20){
    const mainType=tpl.ids.reduce((acc,id)=>{const b=byId(id);return b&&!b.spell&&!acc?b.type:acc;},'');
    let changed=true;
    while(deck.length<20&&changed){
      changed=false;
      for(const id of avail){
        if(deck.length>=20)break;
        const b=byId(id);
        if(!b||b.spell||b.type!==mainType)continue;
        // Skip evo-only if base not in deck
        if(b.evoOnly&&b.ef&&!deck.includes(b.ef))continue;
        if(cnt(id)<3){deck.push(id);changed=true;}
      }
    }
  }

  // Step 3: Fill remaining with any available Pokemon
  if(deck.length<20){
    let changed=true;
    while(deck.length<20&&changed){
      changed=false;
      for(const id of avail){
        if(deck.length>=20)break;
        const b=byId(id);
        if(b&&!b.spell&&cnt(id)<3){deck.push(id);changed=true;}
      }
    }
  }

  // Save to correct slot (initialize decks if not yet existing)
  const eslot=getEditingSlot();
  const raw=loadData();
  if(!raw.decks){
    raw.decks=[
      {name:'Deck 1',cards:raw.deck||[]},
      {name:'Deck 2',cards:[]},{name:'Deck 3',cards:[]},
      {name:'Deck 4',cards:[]},{name:'Deck 5',cards:[]}
    ];
    if(raw.activeDeck===undefined)raw.activeDeck=0;
  }
  raw.decks[eslot].cards=deck.slice(0,20);
  saveData(raw);
  showToast('✅ '+tpl.name+' no Deck '+(eslot+1)+'! ('+deck.length+' cards)',2000);
  renderScreen('deck');
}


function loadData(){
  try{return JSON.parse(localStorage.getItem('pkm_v5')||'{}');}catch(e){return{};}
}
function saveData(d){d.gameVersion='3.0.0';localStorage.setItem('pkm_v5',JSON.stringify(d));}
function getSave(){
  const d=loadData();
  if(!d.unlocked)d.unlocked=[];
  if(!d.xp)d.xp=0;
  if(!d.wins)d.wins=0;
  if(!d.losses)d.losses=0;
  if(!d.beaten)d.beaten=[];
  if(!d.badges)d.badges=[];
  if(!d.backgrounds)d.backgrounds=['default'];
  if(!d.shinies)d.shinies=[];
  if(!d.winStreak)d.winStreak=0;
  if(!d.bestStreak)d.bestStreak=0;
  if(!d.achievements)d.achievements=[];
  if(!d.upgrades)d.upgrades={};
  if(!d.totalDaily)d.totalDaily=0;
  // Multi-deck system
  if(!d.decks){
    d.decks=[
      {name:'Deck 1',cards:d.deck||[]},
      {name:'Deck 2',cards:[]},
      {name:'Deck 3',cards:[]},
      {name:'Deck 4',cards:[]},
      {name:'Deck 5',cards:[]}
    ];
  }
  if(d.activeDeck===undefined)d.activeDeck=0;
  // d.deck is used for battles - always read from active deck slot
  d.deck=(d.decks[d.activeDeck]||{cards:[]}).cards.slice();
  return d;
}
function getLevel(xp){return Math.floor(xp/200)+1;}
function addXP(amount){
  const d=getSave();
  const oldLv=getLevel(d.xp);
  d.xp=(d.xp||0)+amount;
  const newLv=getLevel(d.xp);
  saveData(d);
  if(newLv>oldLv){AUD.levelUp&&AUD.levelUp();checkBadges(d,newLv);showLevelUp(newLv);}
  return newLv>oldLv?newLv:0;
}

function buildAIDeck(diff){
  const pool=[];
  for(let d=1;d<=diff;d++){(POOL_BY_DIFF[d]||[]).forEach(id=>pool.push(id));}
  const deck=[];
  const shuffled=[...pool].sort(()=>Math.random()-.5);
  for(const id of shuffled){
    if(deck.length>=18)break;
    if(byId(id)&&deck.filter(x=>x===id).length<3)deck.push(id);
  }
  while(deck.length<18){
    const id=pool[Math.floor(Math.random()*pool.length)];
    if(byId(id)&&deck.filter(x=>x===id).length<3)deck.push(id);
    if(deck.length>100)break;
  }
  // Add spells based on difficulty
  const aiSpells={1:[],2:['potion','energycard'],3:['potion','potion','energycard','toxicmist'],4:['potion','potion','energycard','toxicmist','icebeam','xattack'],5:['potion','potion','energycard','toxicmist','icebeam','xattack']};
  (aiSpells[Math.min(diff,5)]||[]).forEach(id=>deck.push(id));
  return deck.slice(0,20);
}

function applyUpgrade(card){
  if(!card)return card;
  const sv=getSave();
  const lvl=(sv.upgrades||{})[card.id]||0;
  if(lvl===0)return card;
  return Object.assign({},card,{
    atk:card.atk+lvl*50,
    def:card.def+lvl*50,
    hp:(card.hp||card.def)+lvl*50,
    maxHp:(card.hp||card.def)+lvl*50,
    _upgradeLevel:lvl
  });
}

  };

function drawCard(who){
  const HAND_LIMIT=5;
  if(who==='p'){
    if(!G.pDeck.length)return false;
    if(G.pHand.length>=HAND_LIMIT){
      showToast('🃏 Mão cheia! Jogue cartas antes de comprar. (máx '+HAND_LIMIT+')',2000);
      return false;
    }
    G.pHand.push(G.pDeck.pop());return true;
  }
  if(who==='e'){
    if(!G.eDeck.length)return false;
    if(G.eHand.length>=HAND_LIMIT)return false;
    G.eHand.push(G.eDeck.pop());return true;
  }
  return false;
}

function startPlayerTurn(){
  G.turnNum++;
  G.maxMana=Math.min(G.turnNum,(G.mode==='lightning'?8:10));
  G.mana=G.maxMana;
  G.atkd=new Set();
  G.shield=false;G.doubleStrike=false;G.discardedThisTurn=false;G.pendingDiscard=-1;G.pendingFreeze=false;removeCardPreview();

  G.pField.forEach(c=>{if(c)c.summoning=false;});
  drawCard('p');
  processStatus('p');
  processPassiveTurn(G.pField,true);
  processPassiveTurn(G.eField,false);

}

function processStatus(who){
  const field=who==='p'?G.pField:G.eField;
  field.forEach((card,i)=>{
    if(!card||!card.status)return;
    if(card.status.burn){
      const dmg=Math.floor((card.maxHp||500)*.06);
      card.hp=Math.max(0,card.hp-dmg);
      showDamageFloat(who,i,dmg);
      addLog(`🔥 ${card.name} sofreu ${dmg} de queimadura!`);
    }
    if(card.status.poison){
      const dmg=Math.floor((card.maxHp||500)*.08);
      card.hp=Math.max(0,card.hp-dmg);
      showDamageFloat(who,i,dmg);
      addLog(`☠️ ${card.name} sofreu ${dmg} de veneno!`);
      if(card.hp<=0){
        addLog(`💀 ${card.name} sucumbiu ao veneno!`);
        if(who==='p')updateDailyProgress('kos',0);
        else updateDailyProgress('kos',1);
      }
    }
    if(card.status.freeze>0)card.status.freeze--;
    if(card.status.paralyze>0)card.status.paralyze--;
  });
}

function tryApplyStatus(attacker,target){
  const chance=0.25;
  if(!target||!target.hp)return;
  if(!target.status)target.status={};
  if(attacker.type==='fire'&&Math.random()<chance&&!target.status.burn){
    target.status.burn=true;addLog(`${target.name} foi queimado!🔥`);
  }
  if(attacker.type==='electric'&&Math.random()<chance&&!target.status.paralyze){
    target.status.paralyze=1;addLog(`${target.name} está paralisado!⚡`);
  }
  if(attacker.type==='ice'&&Math.random()<0.2&&!target.status.freeze){
    target.status.freeze=2;addLog(`${target.name} foi congelado!❄️`);
  }
  if(attacker.type==='poison'&&Math.random()<0.3&&!target.status.poison){
    target.status.poison=true;addLog(`${target.name} foi envenenado!☠️`);
  }
}

function calcDmg(attacker,defender){
  const raw=Math.max(80,(attacker.atk||100)-Math.floor((defender.def||500)*0.4));
  const typeMul=(TC[attacker.type]||{})[defender.type]||1;
  const passiveMul=applyPassive(attacker,null,null,null,1);
  const weatherMul=getWeatherBonus(attacker.type);
  const variance=0.9+Math.random()*0.2;
  return Math.floor(raw*typeMul*passiveMul*weatherMul*variance);
}

function doAttack(atk,defField,defWho,slotIdx){
  if(atk.status&&atk.status.freeze>0){addLog(`${atk.name} está congelado!`);return false;}
  if(atk.status&&atk.status.paralyze>0){atk.status.paralyze=0;addLog(`${atk.name} estava paralisado!`);return false;}
  // POSITIONAL: attack same slot
  const target=defField[slotIdx];
  if(!target||target.hp<=0){
    // Empty opposite slot = direct attack on LP
    const dmg=atk.atk||100;
    if(defWho==='e'){
      // Player attacks enemy directly - eShield blocks
      if(G.eShield){G.eShield=false;addLog('🛡️ Escudo da IA bloqueou o ataque direto!');}
      else{G.eHP=Math.max(0,G.eHP-dmg);addLog(`⚔️ ${atk.name} slot${slotIdx+1}→DIRETO: -${dmg} LP rival!`);trackEvent('lp_dmg',{dmg,who:'e'});}
    }else{
      // AI attacks player directly - shield blocks
      if(G.shield){G.shield=false;addLog('🛡️ Escudo bloqueou o ataque direto da IA!');}
      else{G.pHP=Math.max(0,G.pHP-dmg);addLog(`🤖 ${atk.name} slot${slotIdx+1}→DIRETO: -${dmg} LP!`);trackEvent('lp_dmg',{dmg,who:'p'});}
    }
    return true;
  }
  // Fight the card in same slot
  const dmg=calcDmg(atk,target);
  const excess=dmg>target.hp?Math.min(dmg-target.hp,Math.floor((atk.atk||100)*0.25)):0;
  // Overflow capped at 25% of attacker ATK — prevents one-shot LP damage
  const kills=dmg>=target.hp;
  target.hp=Math.max(0,target.hp-dmg);
  tryApplyStatus(atk,target);
  const eff=(TC[atk.type]||{})[target.type];
  const effStr=eff>=1.75?' 💥SUPER!':eff>=1.5?' ✨eficaz':eff<=0.5?' 🛡️fraco':'';
  addLog(`⚔️ ${atk.name}[${slotIdx+1}]→${target.name}: -${dmg}${effStr}${kills?' 💀':''}`);
  showDamageFloat(defWho,slotIdx,dmg);
  triggerHitFlash(defWho,slotIdx);

  trackEvent(kills?'ko':'dmg',{attacker:atk.name,defender:target.name,dmg,who:defWho});
  if(kills&&defWho==='e')updateDailyProgress('kos',1);
  checkPassiveOnHit(atk,target,defField,slotIdx,defWho,dmg);
  AUD.hit&&AUD.hit();
  if(defWho==='p'){flashScreen('red',300);if(dmg>800)shakeScreen();}
  if(kills&&target.hp<=0){
    triggerKOAnim(defWho,slotIdx);
    spawnDestroyEffect(defWho,slotIdx,(_TCOLS[target.type]||['#f0c040'])[0]);
    defField[slotIdx]=null;
    if(excess>0){
      if(defWho==='e'){
        if(G.eShield){G.eShield=false;addLog('🛡️ Escudo da IA bloqueou o excedente!');}
        else{G.eHP=Math.max(0,G.eHP-excess);addLog(`💥 Excedente: -${excess} LP rival!`);trackEvent('lp_dmg',{dmg:excess,who:'e'});}
      }else{
        if(G.shield){G.shield=false;addLog('🛡️ Escudo bloqueou o dano excedente!');}
        else{G.pHP=Math.max(0,G.pHP-excess);addLog(`💥 Excedente: -${excess} LP!`);trackEvent('lp_dmg',{dmg:excess,who:'p'});}
      }
    }
  }
  return true;
}

function playerAttack(slotIdx){
  if(G.busy||G.phase!=='player')return;
  const card=G.pField[slotIdx];
  if(!card||card.hp<=0)return;
  if(G.atkd.has(slotIdx)){showToast('Este Pokémon já atacou este turno!');return;}
  if(card.summoning){showToast(`${card.name} está em repouso — ataca no próximo turno 💤`);return;}
  AUD.boot();
  // Show type effectiveness hint before attacking
  const enemy=G.eField[slotIdx];
  if(enemy&&enemy.hp>0){
    const eff=(TC[card.type]||{})[enemy.type]||1;
    if(eff>=1.5)showToast(`⚡ SUPER EFETIVO! ${card.name} vs ${enemy.name} (+50% dano)`,1500);
    else if(eff<=0.7)showToast(`💧 Pouco efetivo... ${card.name} vs ${enemy.name} (-30% dano)`,1500);
  }
  AUD.attack&&AUD.attack(card.type);
  spawnAttackEffect(card.type,false,slotIdx);
  const ok=doAttack(card,G.eField,'e',slotIdx);
  if(ok&&G.doubleStrike){doAttack(card,G.eField,'e',slotIdx);G.doubleStrike=false;}
  if(ok)G.atkd.add(slotIdx);
  G.attackingSlot=-1;
  checkDeath();
  if(G.phase!=='over')renderScreen('game');
}

function summonCard(handIdx){
  removeCardPreview();
  // Called when tapping a selected card — only handles spells directly
  // Pokémon placement is handled by placeCard(slotIdx) when clicking field
  if(G.busy||G.phase!=='player')return;
  const card=G.pHand[handIdx];
  if(!card)return;
  if(card.spell){useSpell(handIdx);return;}
  // For non-spell cards, just select/deselect (user should click a field slot)
  G.selHand=G.selHand===handIdx?-1:handIdx;
  renderScreen('game');
}

function useSpell(handIdx){
  AUD.boot();
  const card=G.pHand[handIdx];
  if(!card||!card.spell)return;
  const spellCost=card.cost||MANA_COST[card.r||0];
  if(G.mana<spellCost){showToast(`Mana insuficiente! Precisa ${spellCost} 💎, tem ${G.mana}`);return;}
  G.mana-=spellCost;
  G.pHand.splice(handIdx,1);G.selHand=-1;
  updateDailyProgress('spells',1);
  const eff=card.effect;
  if(eff==='heal800'){
    const heal=Math.floor(G.maxPHP*0.2);G.pHP=Math.min(G.maxPHP,G.pHP+heal);
    addLog(`💊 Poção: +${heal} HP!`);AUD.heal&&AUD.heal();flashScreen('green',400);
    // Show heal on most damaged player pokemon
    const healSlot=G.pField.reduce((best,c,i)=>c&&c.hp>0&&(best<0||(G.pField[best]?.hp||999)>(c.hp))&&(c.maxHp-c.hp)>0?i:best,-1);
    if(healSlot>=0)showDamageFloat('p',healSlot,heal,true);
    else showHPFloat('+'+heal+' LP','#44ff88'); // fallback: show on HP bar
  }
  else if(eff==='extramana'){G.mana=Math.min(G.mana+3,G.maxMana+3);addLog(`Carta Energia: +3 Mana!⚡`);AUD.spell&&AUD.spell();}
  else if(eff==='draw2'){
    let drawn=0;
    for(let i=0;i<2;i++){if(G.pHand.length<5&&G.pDeck.length>0){drawCard('p');drawn++;}}
    addLog(`📖 Compra Extra: +${drawn} carta${drawn!==1?'s':''}!`);
    AUD.spell&&AUD.spell();
    showToast(`📖 +${drawn} carta${drawn!==1?'s':''} comprada${drawn!==1?'s':''}!`,1500);
  }
  else if(eff==='pokeball'){
    const slots=G.eField.map((c,i)=>c?i:-1).filter(i=>i>=0);
    if(slots.length>0){
      const si=slots[Math.floor(Math.random()*slots.length)];
      const stolen={...G.eField[si]};
      G.eField[si]=null;
      const ps=G.pField.indexOf(null);
      if(ps>=0)G.pField[ps]=stolen;
      else G.pHand.push(stolen);
      addLog(`Pokébola: roubou ${stolen.name}!`);AUD.spell&&AUD.spell();
    }else showToast('Sem alvo!');
  }
  else if(eff==='doublestrike'){G.doubleStrike=true;addLog('X-Ataque: próximo ataque duplo!');AUD.spell&&AUD.spell();}
  else if(eff==='shield'){G.shield=true;addLog('Escudo: bloqueará próximo ataque direto!');AUD.spell&&AUD.spell();}
  else if(eff==='toxicall'){
    G.eField.forEach(c=>{if(c)c.status={...c.status,poison:true};});
    addLog('Névoa Tóxica: todos os inimigos envenenados!☠️');AUD.status&&AUD.status();
  }
  else if(eff==='freeze1'){
    const targets=G.eField.map((c,i)=>c&&c.hp>0?i:-1).filter(i=>i>=0);
    if(targets.length===1){
      const t=G.eField[targets[0]];
      t.status={...(t.status||{}),freeze:2};
      addLog(`❄️ Rajada de Gelo: ${t.name} congelado por 2 turnos!`);
      AUD.status&&AUD.status();
    }else if(targets.length>1){
      G.pendingFreeze=true;
      G.selHand=-1;
      showToast('❄️ Toque no inimigo que deseja congelar!',3000);
      renderScreen('game');
      return;
    }
  }
  renderScreen('game');
}

function placeCard(slotIdx){
  if(G.busy||G.phase!=='player'||G.selHand<0)return;
  const card=G.pHand[G.selHand];
  if(!card||card.spell)return;
  // Block direct summon of evo-only cards
  if(card.evoOnly){
    const base=card.ef?byId(card.ef):null;
    const baseName=base?base.name:(card.ef||'base');
    const hasBaseInField=base&&G.pField.some(f=>f&&f.id===card.ef&&f.hp>0);
    if(hasBaseInField){
      showToast('🌟 Selecione '+card.name+' e clique no '+baseName+' em campo para evoluir!',3000);
    }else{
      showToast('🔒 '+card.name+' evolui do '+baseName+'! Invoque um '+baseName+' em campo primeiro.',3000);
    }
    G.selHand=-1;renderScreen('game');return;
  }
  if(G.pField[slotIdx]!==null){
    // Try evolve if the card in slot matches ef
    if(card.ef&&G.pField[slotIdx].id===card.ef){doEvolve(G.selHand,slotIdx);return;}
    showToast('Slot ocupado!');return;
  }
  const cost=card.cost||MANA_COST[card.r||0];
  if(cost>G.mana){showToast(`Mana insuficiente! (${cost} > ${G.mana} 💎)`);return;}
  G.mana-=cost;
  G.pField[slotIdx]={...card,summoning:true,hp:card.hp||card.def||500,maxHp:card.maxHp||card.def||500};
  G.pHand.splice(G.selHand,1);G.selHand=-1;
  AUD.boot();AUD.summon();
  addLog(`✨ ${card.name} invocado no slot ${slotIdx+1}! (💎-${cost}) [💤 ataca no próx. turno]`);
  triggerSummonAnim('p',slotIdx);
  // Check weather activation
  const newWeather=getWeather(G.pField);
  if(newWeather){
    const wi=WEATHER_INFO[newWeather];
    if(wi)showToast(`${wi.icon} ${wi.name} ativado! ${(TINFO[newWeather]||{e:''}).e} +12% dano!`,3000);
  }
  renderScreen('game');
}

function getEvoOption(){
  if(G.selHand<0)return null;
  const c=G.pHand[G.selHand];
  if(!c||!c.ef)return null;
  const fi=G.pField.findIndex(f=>f&&f.id===c.ef);
  return fi>=0?{hi:G.selHand,fi}:null;
}

function doEvolve(hi,fi){
  const base=G.pField[fi];
  const next=G.pHand[hi];
  if(!base||!next)return;
  // Evolução custa mana da carta evoluída
  const cost=next.cost||MANA_COST[next.r||0];
  if(G.mana<cost){
    showToast(`Mana insuficiente para evoluir! Precisa ${cost} 💎, tem ${G.mana}`,2000);
    return;
  }
  G.mana-=cost;
  G.pField[fi]={...next,hp:next.hp||next.def||500,maxHp:next.maxHp||next.def||500,summoning:true};
  G.pHand.splice(hi,1);G.selHand=-1;
  AUD.boot();AUD.evolve&&AUD.evolve();triggerEvoFlash(fi);
  addLog(`🌟 ${base.name} evoluiu para ${next.name}! (💎-${cost}) ATK: ${next.atk}`);
  renderScreen('game');
}

function getTypeHints(card){
  if(!card||card.spell)return[];
  return G.eField.map((ec,i)=>{
    if(!ec)return null;
    const m=(TC[card.type]||{})[ec.type]||1;
    return m>=1.75?{i,msg:'💥SUPER!',col:'#ffcc00'}:m>=1.5?{i,msg:'✨eficaz',col:'#88ff88'}:m<=0.5?{i,msg:'🛡️fraco',col:'#ff8888'}:null;
  }).filter(Boolean);
}

function selectHand(idx){
  AUD.boot();
  G.selHand=G.selHand===idx?-1:idx;
  renderScreen('game');
  if(G.selHand>=0){
    const c=G.pHand[G.selHand];
    if(c)showCardPreview(c,typeColor(c.type)||'#f0c040');
  } else {
    removeCardPreview();
  }
}

function endPlayerTurn(){
  AUD.boot();
  if(G.phase==='over')return;
  if(G.busy||G.phase!=='player')return;
  // Remove summoning sickness
  G.pField.forEach(c=>{if(c)c.summoning=false;});
  G.phase='enemy';
  addLog('--- Turno da IA ---');
  renderScreen('game');
  setTimeout(()=>aiTurn(),600);
}

function aiTurn(){
  G.busy=true;
  const diff=G.diff||2;
  const eMaxMana=Math.min(G.turnNum+(G.mode==='lightning'?4:2),10);
  let eMana=eMaxMana;
  drawCard('e');
  processStatus('e');
  if(G.phase==='over'){G.busy=false;return;}
  G.eField.forEach(c=>{if(c)c.summoning=false;});
  // AI discards evo-only cards if base not in field (smart hand management)
  if(diff>=2){
    const stuck=G.eHand.filter(c=>c.evoOnly&&c.ef&&!G.eField.some(f=>f&&f.id===c.ef&&f.hp>0));
    if(stuck.length>0&&G.eHand.length>=4){
      const discard=stuck[0];
      G.eHand.splice(G.eHand.indexOf(discard),1);
      G.eDeck.unshift(discard);
      drawCard('e');
      addLog(`🤖 IA descartou ${discard.name} (sem base em campo)`);
    }
  }

  // === DIFFICULTY MULTIPLIER ===
  const DIFF_MULT=[1,1,1,1,1.15,1.35]; // só Mestre e MADARA ganham buff de stats
  const dMult=DIFF_MULT[Math.min(diff,5)];

  // Helper to buff a card based on difficulty
  function buffCard(card){
    if(dMult===1)return card;
    return{...card,
      atk:Math.floor((card.atk||100)*dMult),
      def:Math.floor((card.def||500)*dMult),
      hp:Math.floor((card.hp||(card.def||500))*dMult),
      maxHp:Math.floor((card.maxHp||(card.def||500))*dMult),
    };
  }
  // Buff only applied when card is summoned (not every turn)

  // === 1. USE SPELLS STRATEGICALLY ===
  const spellOrder=['energycard','xattack','toxicmist','icebeam','potion','shield'];
  for(const sid of spellOrder){
    const ci=G.eHand.findIndex(c=>c.spell&&c.id===sid);
    if(ci<0)continue;
    const card=G.eHand[ci];
    const pActive=G.pField.filter(c=>c&&c.hp>0);
    const eActive=G.eField.filter(c=>c&&c.hp>0&&!c.summoning);
    let used=false;

    if(sid==='potion'&&G.eHP<G.maxEHP*0.4){
      const eHeal=Math.floor(G.maxEHP*0.2);
      G.eHP=Math.min(G.maxEHP,G.eHP+eHeal);
      addLog(`🤖 IA usou Poção! +${eHeal} HP 💊`);AUD.heal&&AUD.heal();
      showToast('🤖 IA usou 💊 Poção! +'+eHeal+' HP',2000);
      const ehSlot=G.eField.reduce((b,c,i)=>c&&c.hp>0&&(b<0||(G.eField[b]?.hp||999)>c.hp)?i:b,-1);
      if(ehSlot>=0)showDamageFloat('e',ehSlot,eHeal,true);
      else showHPFloat('+'+eHeal+' LP IA','#44ff88');
      used=true;
    }else if(sid==='energycard'){
      eMana=Math.min(eMana+3,10);
      addLog('🤖 IA usou Energia Extra! +3 mana ⚡');used=true;
    }else if(sid==='toxicmist'&&pActive.length>=2&&diff>=3){
      G.pField.forEach(c=>{if(c&&c.hp>0)c.status={...(c.status||{}),poison:true};});
      addLog('🤖 IA usou Névoa Tóxica! ☠️ Todos envenenados!');AUD.status&&AUD.status();
      showToast('⚠️ IA usou ☠️ Névoa Tóxica! Seus Pokémon foram envenenados!',3000);used=true;
    }else if(sid==='icebeam'&&pActive.length>0&&diff>=3){
      const t=pActive.sort((a,b)=>(b.atk||0)-(a.atk||0))[0];
      t.status={...(t.status||{}),freeze:2};
      addLog(`🤖 IA usou Rajada de Gelo em ${t.name}! ❄️ Congelado!`);
      showToast('⚠️ IA usou ❄️ Rajada de Gelo em '+t.name+'! Congelado por 2 turnos!',3000);used=true;
    }else if(sid==='xattack'&&eActive.length>0&&diff>=2){
      // Use before attacking strongest player card
      const strongest=G.pField.filter(c=>c&&c.hp>0).sort((a,b)=>(b.atk||0)-(a.atk||0))[0];
      eActive.forEach(c=>{c.atk=Math.floor((c.atk||100)*1.5);});
      addLog(`🤖 IA usou X-Ataque! ⚔️ ATK +50%!${strongest?' (foco em '+strongest.name+')':''}`);
      showToast('⚠️ IA usou ⚔️ X-Ataque! ATK +50%!',2500);used=true;
    }else if(sid==='shield'&&diff>=3){
      // Use shield when player has strong attacker and AI is losing HP
      const playerATK=G.pField.filter(c=>c&&c.hp>0).reduce((m,c)=>Math.max(m,c.atk||0),0);
      if(playerATK>1200||G.eHP<G.maxEHP*0.5){
        G.eShield=true;
        addLog('🤖 IA ativou Escudo! 🛡️');
        showToast('⚠️ IA ativou 🛡️ Escudo! Próximo ataque direto será bloqueado!',2500);used=true;
      }
    }
    if(used)G.eHand.splice(ci,1);
  }

  // === 2. EVOLVE AI POKEMON ===
  const evoAttempts=[...G.eHand].filter(c=>!c.spell&&c.ef);
  for(const card of evoAttempts){
    const fi=G.eField.findIndex(f=>f&&f.id===card.ef&&f.hp>0);
    if(fi<0)continue;
    const base=G.eField[fi];
    const evolved=buffCard({...card,summoning:true, // evolução = repouso no turno
      hp:card.def||500,maxHp:card.def||500,status:{}});
    G.eField[fi]=evolved;
    G.eHand.splice(G.eHand.findIndex(c=>c.uid===card.uid),1);
    addLog(`🤖 IA evoluiu ${base.name} → ${card.name}! 🌟`);
    AUD.evolve&&AUD.evolve();
    if(G.phase==='over'){G.busy=false;return;}
  }

  // === 3. SUMMON POKEMON STRATEGICALLY ===
  // Sort hand: prefer type-effective vs player, then highest ATK
  const summonHand=[...G.eHand].filter(c=>!c.spell&&!c.evoOnly)
    .sort((a,b)=>{
      // Priority: type counter > ATK > cost efficiency
      const aSlot=G.eField.findIndex(f=>f===null);
      const bSlot=G.eField.findIndex(f=>f===null);
      const pOppA=aSlot>=0?G.pField[aSlot]:null;
      const pOppB=bSlot>=0?G.pField[bSlot]:null;
      const aEff=G.pField.filter(p=>p&&p.hp>0).reduce((m,p)=>Math.max(m,(TC[a.type]||{})[p.type]||1),1);
      const bEff=G.pField.filter(p=>p&&p.hp>0).reduce((m,p)=>Math.max(m,(TC[b.type]||{})[p.type]||1),1);
      // Prefer type advantage, then ATK/cost ratio
      const aScore=aEff*1000+(a.atk||0)/(a.cost||1);
      const bScore=bEff*1000+(b.atk||0)/(b.cost||1);
      return bScore-aScore;
    });

  for(const card of summonHand){
    const cost=card.cost||MANA_COST[card.r||0];
    if(cost>eMana)continue;
    // Find best empty slot - prefer slot opposite weak player card
    let bestSlot=-1,bestScore=-1;
    for(let s=0;s<3;s++){
      if(G.eField[s]!==null)continue;
      const opp=G.pField[s];
      let score=opp?( (TC[card.type]||{})[opp.type]||1 ):0.5;
      if(score>bestScore){bestScore=score;bestSlot=s;}
    }
    if(bestSlot<0)break;
    // AI also respects evo-only rule
    if(card.ef&&!card.ev){
      // Try to evolve instead
      const fi=G.eField.findIndex(f=>f&&f.id===card.ef&&f.hp>0);
      if(fi>=0){
        const base=G.eField[fi];
        G.eField[fi]=buffCard({...card,summoning:false,hp:card.def||500,maxHp:card.def||500,status:{}});
        G.eHand.splice(G.eHand.findIndex(c=>c.uid===card.uid),1);
        addLog(`🤖 IA evoluiu ${base.name} → ${card.name}! 🌟`);
        AUD.evolve&&AUD.evolve();
      }
      continue; // skip direct summoning of final evo
    }
    eMana-=cost;
    const summoned=buffCard({...card,summoning:true,
      hp:card.def||500,maxHp:card.def||500,status:{}});
    G.eField[bestSlot]=summoned;
    G.eHand.splice(G.eHand.findIndex(c=>c.uid===card.uid),1);
    const buffLabel=dMult>1?` (💪 +${Math.round((dMult-1)*100)}% stats)`:'';
    addLog(`🤖 IA invocou ${card.name}${buffLabel}`);
    if(G.phase==='over'){G.busy=false;return;}
  }

  // === 4. ATTACK: slot i vs slot i (se vazio, ataca LP direto) ===
  G.eField.forEach((card,ei)=>{
    if(G.phase==='over')return;
    if(!card||!card.hp||card.hp<=0)return;
    if(card.summoning){addLog(`🤖 ${card.name} em repouso.`);return;}
    if(card.status&&(card.status.freeze||0)>0){card.status.freeze--;addLog(`🤖 ${card.name} congelado! ❄️`);return;}
    if(card.status&&(card.status.paralyze||0)>0){card.status.paralyze=0;addLog(`🤖 ${card.name} paralisado!`);return;}

    AUD.attack&&AUD.attack(card.type);
    setTimeout(()=>triggerAttackEffect('e',ei,'p',ei,card.type),80);
    doAttack(card,G.pField,'p',ei,diff);
    checkDeath();
  });

  if(G.phase==='over'){G.busy=false;return;}
  G.busy=false;G.phase='player';
  renderScreen('game');
  setTimeout(()=>{if(G.phase!=='over')startPlayerTurn();},400);
}

function checkDeath(){
  G.pField=G.pField.map(c=>c&&c.hp>0?c:null);
  G.eField=G.eField.map(c=>c&&c.hp>0?c:null);
  if(G.phase==='over')return;
  if(G.pHP<=0||G.eHP<=0){
    G.pHP=Math.max(0,G.pHP);
    G.eHP=Math.max(0,G.eHP);
    G.phase='over';
    G.busy=true;
    endGame(G.eHP<=0);
  }
}

function endGame(win){
  G.phase='over';G.busy=true;
  const streak=updateStreak(win);
  let xp=win?50:3;
  if(win&&streak>=3)xp+=20*(Math.min(streak,10)-2);
  const lvUp=addXP(xp);
  const sv=getSave();
  if(win){sv.wins=(sv.wins||0)+1;saveData(sv);
    updateDailyProgress('wins',1);
    if(streak>=3)updateDailyProgress('streak',1);
    if(G.tourney)updateDailyProgress('tourneys',1);
    const pLost=G.pField.every(c=>!c||c.hp<=0);
    if(!pLost&&!G.eField.some(c=>c&&c.hp>0))updateDailyProgress('perfectWin',1);
  }else{sv.losses=(sv.losses||0)+1;saveData(sv);}
  if(win&&streak>=3)showToast('🔥 Sequência de '+streak+'! +'+Math.min(streak,10)*50+' XP bônus!',2500);
  setTimeout(()=>checkAchievements(),1000);
  AUD.boot();
  win?AUD.victory&&AUD.victory():AUD.defeat&&AUD.defeat();
  // Clear battle overlays
  updateWeatherOverlay(null);
  const dov=document.getElementById('defeat-overlay');if(dov){dov.style.background='';}
  setTimeout(()=>{
    if(win)showVictoryEffect();else showDefeatEffect();
    // Battle summary available via button - don't auto-show
    if(G.tourney&&win){
      const t=TOURNEYS.find(x=>x.id===G.tourney);
      const nextBattle=(G.battleIdx||0)+1;
      if(nextBattle<(t?t.battles:1)){
        renderScreen('tourney_win');
      } else {
        grantPrize(G.tourney);
        renderScreen('prizelist');
      }
    } else {
      renderScreen('result');
    }
    if(lvUp)showToast('🎉 LEVEL UP! Nível '+lvUp,3000);
  },500);
}

function grantPrize(tourneyId){
  const t=TOURNEYS.find(x=>x.id===tourneyId);if(!t)return;
  const sv=getSave();
  if(!sv.beaten)sv.beaten=[];
  if(!sv.beaten.includes(tourneyId))sv.beaten.push(tourneyId);
  if(!sv.copies)sv.copies={};
  if(!sv.unlocked)sv.unlocked=[];

  // Pool baseado na raridade do torneio (prizeRarity)
  const rarity = t.prizeRarity !== undefined ? t.prizeRarity : (t.diff>=4?3:t.diff>=3?2:t.diff>=2?1:0);
  const pool = DB.filter(c=>!c.spell&&(c.r||0)===rarity).map(c=>c.id);
  if(pool.length===0){
    // fallback: pega qualquer pokemon
    pool.push(...DB.filter(c=>!c.spell).map(c=>c.id));
  }

  // Give n cards - for legendary tourney, prioritize unowned first
  const n=t.prizeN||3;
  const prizes=[];
  const unowned=pool.filter(id=>!sv.unlocked.includes(id));
  const priorityPool=t.legendary&&unowned.length>0?[...unowned,...unowned,...pool]:pool;
  for(let i=0;i<n;i++){
    const pick=priorityPool[Math.floor(Math.random()*priorityPool.length)];
    prizes.push(pick);
    if(!sv.unlocked.includes(pick)){
      sv.unlocked.push(pick);
    } else {
      sv.copies[pick]=(sv.copies[pick]||0)+1;
    }
  }
  // Legendary championship: unlock all Shiny + 5 legendaries
  if(t.legendary){
    if(!sv.shinies)sv.shinies=[];
    DB.filter(c=>!c.spell&&(c.r||0)>=3).forEach(b=>{
      if(!sv.shinies.includes(b.id))sv.shinies.push(b.id);
    });
    showToast('✨ MODO SHINY DESBLOQUEADO! Todos os Lendários brilham!',5000);
  }
  saveData(sv);
  _lastPrizes=[...prizes];
  _lastPrizeCopies=prizes.reduce((acc,id)=>{acc[id]=(acc[id]||0)+1;return acc;},{});
}

function applyBackground(){
  const sv=getSave();
  // Retroactively grant backgrounds for current level
  const lv=getLevel(sv.xp||0);
  if(!sv.backgrounds)sv.backgrounds=['default'];
  let changed=false;
  BACKGROUNDS.forEach(bg=>{if(lv>=bg.level&&!sv.backgrounds.includes(bg.id)){sv.backgrounds.push(bg.id);changed=true;}});
  if(changed)saveData(sv);
  const activeBg=sv.activeBg||'default';
  const bg=BACKGROUNDS.find(b=>b.id===activeBg)||BACKGROUNDS[0];
  // Apply to html+body for full coverage
  [document.documentElement,document.body].forEach(el=>{
    el.style.background=bg.css;
    el.style.backgroundSize='cover';
    el.style.backgroundAttachment='fixed';
    el.style.minHeight='100vh';
  });
  const app=document.getElementById('app');
  if(app){app.style.background='transparent';}
}

function selectBg(id){
  const sv=getSave();
  sv.activeBg=id;
  saveData(sv);
  applyBackground();
  renderScreen('backgrounds');
}

function renderBackgrounds(app){
  const sv=getSave();
  const lv=getLevel(sv.xp||0);

  // Grant retroactively in case not done yet
  BACKGROUNDS.forEach(bg=>{if(lv>=bg.level&&!unlocked.includes(bg.id))unlocked.push(bg.id);});
  const active=sv.activeBg||'default';

  app.innerHTML=`
  <div style="padding:12px">
