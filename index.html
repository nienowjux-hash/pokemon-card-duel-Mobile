    <div id="deck-card-list" style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;max-height:44vh;overflow-y:auto">
      ${allOwned.filter(id=>{
        const b=byId(id);if(!b)return false;
        if(typeFilter==='spell')return b.spell;
        if(typeFilter!=='all'&&b.type!==typeFilter)return false;
        if(rarFilter!=='all'&&String(b.r||0)!==rarFilter)return false;
        return true;
      }).map(id=>{
        const b=byId(id);if(!b)return'';
        const cnt=curDeck.cards.filter(x=>x===id).length;
        const tc=typeColor(b.type);
        const rc=RCOLORS[b.r||0];
        const ri=['◆','◆◆','◆◆◆','★'][b.r||0];
        return `<div class="card-mini ${cnt>0?'card-mini-in':''}" style="border-color:${tc};position:relative">
          ${getSpriteUrl(id)?
            `<img src="${getSpriteUrl(id)}" style="width:40px;height:40px;image-rendering:pixelated;object-fit:contain">`
            :`<canvas width=32 height=32 id="dm_${id}" class="card-sprite"></canvas>`}
          <div style="font-size:.62em;color:${tc};text-align:center;font-weight:bold;line-height:1.2">${b.spell?'✨ ':''}${b.name}</div>
          <div style="font-size:.56em;color:${rc};text-align:center">${ri} 💎${MANA_COST[b.r||0]}</div>
          <div style="font-size:.56em;color:#bbb;text-align:center">${b.spell?b.desc||'Magia':`⚔️${b.atk} 🛡️${b.def}`}</div>
          ${b.evoOnly?'<div style="font-size:.48em;color:#ff8866;text-align:center">🔒 Evo de '+(byId(b.ef)?.name||'?')+'</div>':''}
          <div style="display:flex;gap:3px;margin-top:4px">
            <button onclick="event.stopPropagation();addToDeck('${id}')" style="flex:1;padding:3px 0;background:#0d2a0d;border:1px solid #44ff44;color:#44ff44;border-radius:5px;font-size:.8em;font-weight:bold;cursor:pointer">＋</button>
            ${cnt>0?`<button onclick="event.stopPropagation();removeFromDeck('${id}')" style="flex:1;padding:3px 0;background:#2a0d0d;border:1px solid #ff4444;color:#ff4444;border-radius:5px;font-size:.8em;font-weight:bold;cursor:pointer">－</button>`:''}
          </div>
          ${cnt>0?`<div class="deck-cnt">×${cnt}</div>`:''}
        </div>`
      }).join('')}
    </div>
    <div style="color:#555;font-size:.68em;text-align:center">＋ Adicionar &nbsp;|&nbsp; － Remover • Máx 20 cards • Máx 3 cópias</div>
  </div>`;

  setTimeout(()=>{allOwned.forEach(id=>{const cv=document.getElementById('dm_'+id);if(cv&&cv.tagName==='CANVAS')drawSprite(cv,id);});},30);
}


function renderTourney(app){
  const sv=getSave();
  const TCOLS={starter:'#44ff44',medium:'#44aaff',elite:'#cc66ff',champion:'#ffcc00',boss:'#ff5555'};
  app.innerHTML=`
  <div style="padding:14px">
    <div style="display:flex;gap:10px;margin-bottom:14px;align-items:center">
      <button class="btn btn-sm btn-alt" onclick="renderScreen('menu')">← Voltar</button>
      <span style="color:#f0c040;font-size:1.1em;font-weight:bold">🏟️ Torneios</span>
    </div>
    ${TOURNEYS.map(t=>{
      const done=sv.beaten&&sv.beaten.includes(t.id);
          // Legendary requires all others beaten
          const allBeaten=['starter','medium','elite','champion','boss'].every(id=>sv.beaten&&sv.beaten.includes(id));
          const locked=t.locked&&!allBeaten;
      const col=TCOLS[t.id]||'#aaa';
      return `<div style="background:${locked?'#050508':'#0a0a1a'};border:2px solid ${locked?'#222':col+( done?'':'44')};border-radius:10px;padding:12px 14px;margin-bottom:9px;display:flex;align-items:center;gap:10px">
        <div style="flex:1;min-width:0">
          <div style="margin-bottom:5px">
            <span style="background:${col}25;color:${locked?'#444':col};border:1.5px solid ${locked?'#333':col};border-radius:6px;padding:3px 8px;font-weight:bold;font-size:.72em;word-break:break-word;display:block;text-align:center">${done?'✅ ':locked?'🔒 ':''}${t.name}${t.boss?' 👑':''}</span>
          </div>
          <div style="font-size:.65em;color:#999;margin-top:3px">⚔️ ${t.battles} batalha${t.battles>1?'s':''} · ${DIFF_NAMES[t.diff]}</div>
          <div style="font-size:.62em;color:#bbb;margin-top:2px">🎁 ${t.prize}</div>
        </div>
        <button ${locked?'disabled':''} onclick="${locked?'void(0)':'startTourney(\''+t.id+'\''+')'}"
          style="flex-shrink:0;padding:9px 16px;
          background:${locked?'#1a1a1a':col};
          color:${locked?'#444':'#000'};
          border:1px solid ${locked?'#333':col};
          border-radius:8px;font-weight:bold;font-size:.82em;
          cursor:${locked?'not-allowed':'pointer'};
          min-width:60px;opacity:${locked?'.6':'1'}">
          ${locked?'🔒 Bloqueado':done?'Rejog.':'Jogar'}</button>
      </div>`;
    }).join('')}
  </div>`;
}

function startTourney(tId){// stopMenuMusic();
  const t=TOURNEYS.find(x=>x.id===tId);if(!t)return;
  _tourney=t;
  initG({tourney:tId,battleIdx:0,diff:t.diff,boss:t.boss||false,mode:'normal'});
  renderScreen('game');
}

function nextTourneyBattle(){
  const t=TOURNEYS.find(x=>x.id===G.tourney);if(!t)return;
  const nextIdx=G.battleIdx+1;
  if(nextIdx>=t.battles){renderScreen('menu');return;}
  initG({tourney:G.tourney,battleIdx:nextIdx,diff:t.diff,boss:G.boss,mode:'normal'});
  renderScreen('game');
}

function renderGame(app){
  const sv=getSave();const lv=getLevel(sv.xp);
  // Battle background theme from weather
  const pW=getWeather(G.pField),eW=getWeather(G.eField),aW=pW||eW;
  const WI=WEATHER_INFO[aW]||null;
  const dominantType=aW||(G.pField.concat(G.eField).find(c=>c&&c.hp>0)||{type:'normal'}).type;
  startBattleBg(dominantType);
  let arenaBg=document.getElementById('battle-arena-bg');
  if(!arenaBg){
    arenaBg=document.createElement('div');
    arenaBg.id='battle-arena-bg';
    arenaBg.style.cssText='position:fixed;inset:0;background-size:cover;background-position:center;z-index:0;pointer-events:none;opacity:1;transition:background-image .5s';
    document.body.appendChild(arenaBg);
  }
  arenaBg.style.backgroundImage=buildArenaBg(dominantType);
  if(aW!==window._lastWeatherType){
    window._lastWeatherType=aW;
    if(aW){
      setTimeout(()=>playWeatherSound(aW),200);
      if(aW==='fire')setTimeout(()=>triggerFireWeather(),100);
    }
  }
  updateWeatherOverlay(aW);
  const pHPpct=Math.max(0,G.pHP/G.maxPHP*100);
  const eHPpct=Math.max(0,G.eHP/G.maxEHP*100);
  const pHPcol=pHPpct>50?'#22cc44':pHPpct>25?'#ffcc00':'#ff3300';
  const eHPcol=eHPpct>50?'#22cc44':eHPpct>25?'#ffcc00':'#ff3300';
  const selCard=G.selHand>=0?G.pHand[G.selHand]:null;
  const evoOpt=getEvoOption();
  const typeHints=selCard?getTypeHints(selCard):[];
  const hintByESlot=Object.fromEntries(typeHints.map(h=>[h.i,h]));

  function fieldSlot(card,i,who){
    const isP=who==='p';
    const canAtk=isP&&card&&G.phase==='player'&&!G.atkd.has(i)&&!card.summoning&&card.hp>0;
    const isSummonTarget=isP&&!card&&selCard&&!selCard.spell&&G.phase==='player';
    const isEvoTarget=isP&&card&&evoOpt&&evoOpt.fi===i;
    const tc=card?typeColor(card.type):'#1a1a2e';
    const atked=isP&&G.atkd.has(i);
    const hint=!isP&&hintByESlot[i];
    const isFreezeTarget=!isP&&G.pendingFreeze&&card&&card.hp>0;
    const isAttackTarget=!isP&&G.attackingSlot>=0;
    const isSelectedAtk=isP&&G.attackingSlot===i;
    const atkSrc=G.attackingSlot>=0?G.pField[G.attackingSlot]:null;
    const typeHint=isAttackTarget&&card&&atkSrc?((TC[atkSrc.type]||{})[card.type]||1):1;
    const atkTargetCol=typeHint>=1.5?'#ff4444':typeHint<=0.7?'#4488ff':'#ff8800';
    const borderCol=isFreezeTarget?'#88eeff':isSelectedAtk?'#ffffff':isAttackTarget?(card?atkTargetCol:'#ff8800'):isSummonTarget?'#44ff44':isEvoTarget?'#88ff88':canAtk?'#f0c000':hint?hint.col:(card&&card.shiny?'#f0c040':tc);
    const evoReadySlot=isP&&card&&evoOpt&&evoOpt.fi===i;
    const glowStyle=isSelectedAtk?'box-shadow:0 0 16px #ffffff88,animation:shinePulse .6s infinite':isAttackTarget&&card?`box-shadow:0 0 14px ${atkTargetCol}99`:isAttackTarget?`box-shadow:0 0 8px #ff880066`:isSummonTarget?'box-shadow:0 0 12px #44ff4488':isEvoTarget?'box-shadow:0 0 12px #88ff8888,animation:shinePulse 1s infinite':canAtk?'box-shadow:0 0 10px #f0c04066':'';
    const onclick=isP?
      (isSummonTarget?`placeCard(${i})`:(isEvoTarget?`doEvolve(${evoOpt.hi},${i})`:(canAtk||isSelectedAtk?`playerAttack(${i})`:''))):
      (isFreezeTarget?`applyFreezeTarget(${i})`:isAttackTarget&&card&&card.hp>0?`attackTarget(${i})`:'');
    const statusStr=card&&card.status?Object.entries({burn:'🔥',poison:'☠️',freeze:'❄️',paralyze:'⚡'}).filter(([k])=>card.status[k]&&(card.status[k]===true||card.status[k]>0)).map(([,v])=>v).join(''):'';

    return `<div class="field-slot ${card?'field-slot-'+card.type:''}" onclick="${onclick}"
      data-who="${who}" data-slot="${i}"
      style="border-color:${borderCol};${glowStyle};cursor:${onclick?'pointer':'default'};position:relative">
      ${isSummonTarget?`<div style="color:#44ff44;font-size:.75em;text-align:center">➕<br><span style="font-size:.85em">Slot ${i+1}</span></div>`:''}
      ${isEvoTarget?`<div style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:2;background:rgba(0,80,0,.35);border-radius:8px;pointer-events:none"><div style="background:rgba(0,0,0,.8);padding:4px 8px;border-radius:6px;border:1px solid #88ff88;font-size:.68em;color:#88ff88;font-weight:bold;animation:pulse 1s infinite">🌟 CLIQUE PARA<br>EVOLUIR!</div></div>`:''}
      ${card?`
        ${getSpriteUrl(card.id,card.shiny)?
        `<img src="${getSpriteUrl(card.id,card.shiny)}" class="field-sprite-official ${card.summoning?'resting-img':''} ${card.shiny?'sprite-shiny':''}" style="width:80px;height:80px;image-rendering:pixelated;pointer-events:none;object-fit:contain">`
        :`<canvas width=32 height=32 id="fs_${who}${i}" class="card-sprite card-sprite-field ${card.summoning?'resting':''}" style="pointer-events:none"></canvas>`}
        ${card.status&&card.status.freeze>0?'<div class="freeze-overlay"></div>':''}
        ${isP&&G.shield&&!card.summoning?'<div class="shield-bubble"></div>':''}
        <div style="font-size:.65em;color:${tc};text-align:center;line-height:1.3;font-weight:bold;padding:0 2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;${(card.r||0)>=3?'text-shadow:0 0 8px '+tc:''}">
          ${card.shiny?'✨':''}${card.name}${card.upgradeLevel?(' ⬆️'.repeat(card.upgradeLevel)):''}
        </div>
        <div style="font-size:.6em;color:#ccc;text-align:center">⚔${card.atk} 🛡${card.def}</div>
        ${card.summoning?'<div style="position:absolute;inset:0;background:rgba(0,30,100,.55);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:.7em;color:#88aaff;pointer-events:none"><div>💤</div><div style=font-size:.55em>Repouso</div></div>':''}
        <div style="font-size:.58em;color:${card.summoning?'#88aaff':'#ccc'};text-align:center">${card.summoning?'💤 Repouso':`❤${card.hp}/${card.maxHp||card.def}`}${atked?' ✓':canAtk?' ▶':''}${statusStr?' '+statusStr:''}</div>
        ${makeHPBar(card.hp,card.maxHp||card.def||500,who==='e'?'#ff6644':'#44ff88')}
        ${(card.r||0)>=3?`<div style="position:absolute;inset:0;border-radius:10px;background:linear-gradient(135deg,${tc}11,transparent 50%,${tc}08);pointer-events:none"></div>`:''}
      `:`${!isSummonTarget&&!isEvoTarget?'<div style="color:#333;font-size:.75em">vazio</div>':''}`}
      ${hint&&card&&G.attackingSlot<0?`<div style="position:absolute;top:2px;right:2px;font-size:.6em;font-weight:bold;color:${hint.col};background:rgba(0,0,0,.7);padding:1px 3px;border-radius:3px">${hint.msg}</div>`:''}
      ${isAttackTarget&&card?`<div style="position:absolute;top:2px;right:2px;font-size:.65em;font-weight:bold;color:${atkTargetCol};background:rgba(0,0,0,.85);padding:2px 5px;border-radius:4px">${typeHint>=1.5?'🔥 SUPER':typeHint<=0.7?'💧 FRACO':'⚔️ ATACAR'}</div>`:''}
      ${isAttackTarget&&!card?`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.7em;color:#ff8800;font-weight:bold">💥 DIRETO</div>`:''}
      ${isSelectedAtk?`<div style="position:absolute;top:2px;left:2px;font-size:.6em;color:#fff;background:rgba(0,0,0,.8);padding:1px 4px;border-radius:3px">⚔️ ATACANDO</div>`:''}
    </div>`;
  }

  const manaBar=Array.from({length:Math.max(G.maxMana,1)},(_,i)=>`<div class="mana-pip ${i<G.mana?'mana-on':''}"></div>`).join('');
  const canAtkAny=G.phase==='player'&&G.pField.some((c,i)=>c&&c.hp>0&&!G.atkd.has(i)&&!c.summoning);

  app.innerHTML=`
  <div style="padding:4px;display:flex;flex-direction:column;max-width:480px;margin:0 auto;box-sizing:border-box">
  ${WI?`<div style="text-align:center;font-size:.72em;color:#aaa;padding:2px;background:rgba(0,0,0,.4);border-radius:4px;margin-bottom:2px">${WI.icon} ${WI.name} — ${(TINFO[aW]||{}).e||''} +12% dano</div>`:''}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <div style="flex:1">
        <div style="color:#ff6666;font-size:.78em">${G.boss?'👑 MADARA':G.tourney?'🏟️ Torneio':'🤖 IA ('+DIFF_NAMES[G.aiLevel]+')'}</div>
        <div style="color:#fff;font-weight:bold;font-size:.78em">${G.eHP}/${G.maxEHP} HP</div>
        ${makeHPBar(G.eHP,G.maxEHP,eHPcol)}
      </div>
      <div style="color:#777;font-size:.72em;margin-left:10px;text-align:right">🃏${G.eDeck.length}<br>✋${G.eHand.length}</div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-bottom:2px">
      ${G.eField.map((c,i)=>fieldSlot(c,i,'e')).join('')}
    </div>

    <div style="background:#050510;border:1px solid #1a1a3a;border-radius:6px;padding:4px 8px;min-height:48px;max-height:48px;overflow-y:auto;font-size:.67em;color:#88aa88;margin:3px 0;line-height:1.5">
      ${G.logs.slice(0,5).map(l=>`<div>${l}</div>`).join('')}
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-bottom:2px">
      ${G.pField.map((c,i)=>fieldSlot(c,i,'p')).join('')}
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <div style="flex:1">
        <div style="color:#44aaff;font-size:.75em">⭐ Lv${lv} | T${G.turnNum} ${G.phase==='player'?'| <span style=color:#f0c040>Seu turno</span>':'| <span style=color:#ff6666>IA...</span>'}</div>
        <div style="color:#fff;font-weight:bold;font-size:.78em">${G.pHP}/${G.maxPHP} HP</div>
        ${makeHPBar(G.pHP,G.maxPHP,pHPcol)}
      </div>
      <div style="text-align:right;margin-left:10px">
        <div style="color:#88aaff;font-size:.72em">💎 ${G.mana}/${G.maxMana}</div>
        <div style="display:flex;gap:2px;justify-content:flex-end;margin-top:2px">${manaBar}</div>
        <div style="font-size:.62em;color:#444">🃏${G.pDeck.length}</div>
      </div>
    </div>

    ${(()=>{
      const types=G.pField.filter(c=>c&&c.hp>0).map(c=>c.type);
      const cnt={};types.forEach(t=>{cnt[t]=(cnt[t]||0)+1;});
      const almost=Object.entries(cnt).find(([t,n])=>n===2);
      const active=Object.entries(cnt).find(([t,n])=>n>=3);
      if(active){const wi=WEATHER_INFO[active[0]];return wi?`<div style="color:${(TINFO[active[0]]||{c:'#f0c040'}).c};font-size:.7em;text-align:center;padding:2px 6px;border:1px solid currentColor;border-radius:4px;margin:2px 0;background:rgba(0,0,0,.4)">${wi.icon} ${wi.name} ATIVO — +12% dano ${(TINFO[active[0]]||{e:''}).e}</div>`:'';}
      if(almost){const wi=WEATHER_INFO[almost[0]];return wi?`<div style="color:#888;font-size:.7em;text-align:center;padding:2px 6px;border:1px dashed #444;border-radius:4px;margin:2px 0">💡 +1 ${(TINFO[almost[0]]||{e:''}).e} ${almost[0]} ativa ${wi.icon} ${wi.name}!</div>`:'';} return '';
    })()}
    ${G.shield?'<div style="color:#44aaff;font-size:.72em;text-align:center;padding:2px;border:1px solid #44aaff44;border-radius:4px;margin:2px 0">🛡️ Escudo ativo — próximo ataque direto bloqueado</div>':''}
    ${G.doubleStrike?'<div style="color:#ffaa00;font-size:.72em;text-align:center;padding:2px;border:1px solid #ffaa0044;border-radius:4px;margin:2px 0">⚡ X-Ataque ativo — próximo ataque duplo</div>':''}

    <div id="hand-area" style="border-top:1px solid #1a1a3a;padding:4px 2px 2px;margin-bottom:2px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch">
      <div style="display:flex;gap:6px;padding:2px 4px 6px;align-items:flex-end;justify-content:flex-start;width:max-content;min-width:100%">
        ${G.pHand.map((c,i)=>{
          const tc=typeColor(c.type);
          const sel=G.selHand===i;
          const cost=c.cost||MANA_COST[c.r||0];
          const affordable=G.mana>=cost;
          const hasEvo=c.ef&&G.pField.some(f=>f&&f.id===c.ef&&f.hp>0);

          const manaCost=c.cost||MANA_COST[c.r||0];
          const upLvl=c._upgradeLevel||0;
          const upClass=upLvl>0?'upgrade-'+upLvl:'';
          const evoReady=c.evoOnly&&hasEvo;
          return `<div onclick="handleHandCardClick(${i})" class="${upClass}" style="
            width:80px;min-width:80px;height:120px;
            border-radius:10px;cursor:pointer;position:relative;
            overflow:hidden;flex-shrink:0;
            border:2px solid ${sel?'#f0c040':tc+'cc'};
            background:linear-gradient(175deg,${tc}40 0%,#06061a 50%,${tc}18 100%);
            box-shadow:${sel?'0 0 0 2px #f0c040,0 0 18px #f0c04088':'0 3px 8px rgba(0,0,0,.8)'};
            display:flex;flex-direction:column;
            ${!affordable&&!c.spell?'opacity:.32;filter:grayscale(.8)':''}
          ">
            <!-- TOP: mana -->
            <div style="display:flex;justify-content:space-between;align-items:center;padding:2px 5px;background:${tc};flex-shrink:0;border-radius:8px 8px 0 0">
              <span style="font-size:.75em">${(TINFO[c.type]||{e:'?'}).e}</span>
              <span style="font-size:.68em;color:#fff;font-weight:bold">${manaCost}💎</span>
            </div>
            <!-- SPRITE centralizado com fundo -->
            <div style="flex:1;display:flex;justify-content:center;align-items:center;background:radial-gradient(ellipse at center,${tc}30 0%,transparent 70%)">
              ${spriteUrl
                ?`<img src="${spriteUrl}" style="width:52px;height:52px;image-rendering:pixelated;object-fit:contain">`
                :`<canvas width=32 height=32 id="hc_${i}" class="card-sprite" style="width:44px;height:44px;image-rendering:pixelated"></canvas>`}
              ${evoReady?'<div style="position:absolute;top:20px;right:2px;font-size:.55em;background:#44ff88;color:#000;font-weight:bold;border-radius:3px;padding:1px 3px">▲EVO</div>':''}
            </div>
            <!-- NOME -->
            <div style="font-size:.58em;color:#fff;text-align:center;padding:2px 3px;font-weight:bold;line-height:1.2;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;background:rgba(0,0,0,.5);flex-shrink:0;min-height:2em">${c.name}</div>

            ${sel?'<div style="height:3px;background:linear-gradient(90deg,transparent,#f0c040,transparent);flex-shrink:0"></div>':''}

            ${G.phase==='player'?`<button onclick="event.stopPropagation();discardCard(${i})" style="position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:#300;border:1px solid #f44;color:#f66;border-radius:50%;font-size:.55em;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center">♻</button>`:''}
          </div>`;
        })()
}).join('')}

    </div>
    <!-- Action bar -->

function _getPos(who,slot){
  const el=document.getElementById('fs_'+who+slot);
  const cv=document.getElementById('expl-canvas');
  if(el&&cv){
    const er=cv.getBoundingClientRect(),sr=el.getBoundingClientRect();
    // CRITICAL: scale CSS pixels to canvas internal pixels
    const sx=cv.width/er.width,sy=cv.height/er.height;
    return{x:(sr.left+sr.width/2-er.left)*sx,y:(sr.top+sr.height/2-er.top)*sy};
  }
  return{x:[110,320,530][slot]||320,y:who==='e'?100:265};
}

const _TCOLS={
  fire:['#ff2200','#ff6600','#ffaa00'],water:['#0055ff','#33aaff','#99ddff'],
  grass:['#118833','#33cc44','#88ff66'],electric:['#ffcc00','#ffff44','#ffffff'],
  psychic:['#8800ee','#cc33ff','#ff88ff'],ghost:['#330077','#6622aa','#aa77ff'],
  ice:['#55aaff','#99ccff','#ddeeff'],dragon:['#cc7700','#ff9900','#ffcc55'],
  fighting:['#bb2200','#ff4400','#ff9966'],rock:['#776655','#999977','#ccbbaa'],
  poison:['#770099','#aa22cc','#ee77ff'],normal:['#777777','#aaaaaa','#dddddd']
};

function spawnAttackEffect(type,fromEnemy,slotIdx){
  const cv=document.getElementById('expl-canvas');if(!cv)return;
  const ctx=cv.getContext('2d');
  const fw=fromEnemy?'e':'p',tw=fromEnemy?'p':'e';
  const from=_getPos(fw,slotIdx),to=_getPos(tw,slotIdx);
  const cols=_TCOLS[type]||_TCOLS.normal;
  if(window._effRaf){cancelAnimationFrame(window._effRaf);window._effRaf=null;}
  ctx.clearRect(0,0,cv.width,cv.height);
  // Immediate flash at attacker position so we know it's working
  ctx.globalAlpha=.6;ctx.fillStyle=cols[0];
  ctx.shadowBlur=40;ctx.shadowColor=cols[1];
  ctx.beginPath();ctx.arc(from.x,from.y,28,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;ctx.globalAlpha=1;
  const PFRAMES=18;const parts=[];let fr=0;
  function tick(){
    ctx.clearRect(0,0,cv.width,cv.height);
    if(fr<PFRAMES){
      const t=fr/PFRAMES,px=from.x+(to.x-from.x)*t,py=from.y+(to.y-from.y)*t;
      // Trail line from start to current position
      ctx.globalAlpha=.25;ctx.strokeStyle=cols[0];ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(from.x,from.y);ctx.lineTo(px,py);ctx.stroke();
      ctx.globalAlpha=1;
      _drawProj(ctx,type,px,py,cols,t);
    }else{
      if(fr===PFRAMES){
        // Impact flash
        ctx.globalAlpha=.75;ctx.fillStyle=cols[1];
        ctx.shadowBlur=28;ctx.shadowColor=cols[0];
        ctx.beginPath();ctx.arc(to.x,to.y,22,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;ctx.globalAlpha=1;
        for(let i=0;i<30;i++){
          const a=Math.random()*Math.PI*2,sp=2+Math.random()*6;
          parts.push({x:to.x,y:to.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5,
            life:1,dec:.025+Math.random()*.04,sz:3+Math.random()*10,
            col:cols[Math.floor(Math.random()*3)]});
        }
      }
      let any=false;
      for(const p of parts){
        p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.life-=p.dec;
        if(p.life<=0)continue;any=true;
        ctx.globalAlpha=Math.max(0,p.life);
        _drawPart(ctx,type,p);
      }
      ctx.globalAlpha=1;
      if(fr>PFRAMES+5&&!any){ctx.clearRect(0,0,cv.width,cv.height);return;}
    }
    fr++;window._effRaf=requestAnimationFrame(tick);
  }
  tick();
}

function spawnDestroyEffect(who,slotIdx,col){
  const pos=_getPos(who,slotIdx);
  const cv=document.getElementById('expl-canvas');if(!cv)return;
  const ctx=cv.getContext('2d');
  // Flash + card fragments breaking apart
  const parts=[];const c=col||'#f0c040';
  // Card-shaped fragments
  for(let i=0;i<20;i++){
    const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*5;
    parts.push({x:pos.x+(Math.random()-.5)*30,y:pos.y+(Math.random()-.5)*40,
      vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,
      life:1,dec:.022+Math.random()*.035,
      w:4+Math.random()*14,h:4+Math.random()*18,
      rot:Math.random()*Math.PI*2,rotV:(Math.random()-.5)*.25,col:c});
  }
  // Extra glow particles
  for(let i=0;i<15;i++){
    const a=Math.random()*Math.PI*2,sp=.5+Math.random()*3;
    parts.push({x:pos.x,y:pos.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,
      life:1,dec:.03+Math.random()*.05,sz:4+Math.random()*8,col:'#ffffff',isGlow:true});
  }
  let draf=null;
  function tickD(){
    ctx.clearRect(0,0,cv.width,cv.height);
    // Impact flash first frame
    if(parts[0].life>0.95){
      ctx.globalAlpha=.6;ctx.fillStyle='#ffffff';
      ctx.shadowBlur=30;ctx.shadowColor=c;
      ctx.beginPath();ctx.arc(pos.x,pos.y,35,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;ctx.globalAlpha=1;
    }
    let any=false;
    for(const p of parts){
      if(p.life<=0)continue;any=true;
      p.x+=p.vx;p.y+=p.vy;p.vy+=.2;p.life-=p.dec;
      ctx.globalAlpha=Math.max(0,p.life);
      if(p.isGlow){
        ctx.fillStyle=p.col;ctx.shadowBlur=6;ctx.shadowColor=c;
        ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.1,p.sz*p.life),0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;
      }else{
        p.rot+=p.rotV;
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
        ctx.fillStyle=p.col;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
        ctx.restore();
      }
    }
    ctx.globalAlpha=1;
    if(any)draf=requestAnimationFrame(tickD);
    else ctx.clearRect(0,0,cv.width,cv.height);
  }
  tickD();
}

function _drawProj(ctx,type,x,y,cols,t){
  const sz=10+t*7;ctx.globalAlpha=.92;
  ctx.shadowBlur=18;ctx.shadowColor=cols[0];
  if(type==='fire'){
    for(let i=0;i<3;i++){
      ctx.fillStyle=cols[i];ctx.beginPath();
      ctx.arc(x+(Math.random()-.5)*7,y+(Math.random()-.5)*7,sz-i*2.5,0,Math.PI*2);ctx.fill();
    }
  }else if(type==='electric'){
    ctx.shadowBlur=22;
    [4,2].forEach((lw,li)=>{
      ctx.strokeStyle=li===0?cols[0]:cols[2];ctx.lineWidth=lw;
      ctx.beginPath();ctx.moveTo(x-sz,y-sz*.8);
      ctx.lineTo(x+sz*.5,y-sz*.2);ctx.lineTo(x-sz*.4,y+sz*.3);
      ctx.lineTo(x+sz,y+sz*.9);ctx.stroke();
    });
  }else if(type==='water'){
    ctx.fillStyle=cols[0];ctx.beginPath();ctx.ellipse(x,y,sz*.65,sz,.1,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=cols[2];ctx.globalAlpha=.45;ctx.beginPath();ctx.ellipse(x-sz*.2,y-sz*.3,sz*.25,sz*.5,-.3,0,Math.PI*2);ctx.fill();
  }else if(type==='grass'){
    ctx.save();ctx.translate(x,y);ctx.rotate(t*Math.PI*5);
    ctx.fillStyle=cols[0];ctx.beginPath();ctx.ellipse(0,0,sz*.45,sz,.3,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=cols[2];ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(0,-sz);ctx.lineTo(0,sz);ctx.stroke();
    ctx.restore();
  }else if(type==='ice'){
    ctx.fillStyle=cols[0];
    ctx.beginPath();ctx.moveTo(x,y-sz);ctx.lineTo(x+sz*.6,y);ctx.lineTo(x,y+sz*.4);ctx.lineTo(x-sz*.6,y);ctx.closePath();ctx.fill();
    ctx.fillStyle=cols[2];ctx.globalAlpha=.55;
    ctx.beginPath();ctx.moveTo(x,y-sz*.7);ctx.lineTo(x+sz*.3,y);ctx.lineTo(x,y+sz*.25);ctx.lineTo(x-sz*.3,y);ctx.closePath();ctx.fill();
  }else if(type==='ghost'){
    for(let i=0;i<4;i++){
      const ox=Math.sin(t*Math.PI*4+i*1.6)*12;
      ctx.globalAlpha=.65-i*.14;ctx.fillStyle=cols[i%3];
      ctx.beginPath();ctx.arc(x+ox,y+i*8,sz-i*2.5,0,Math.PI*2);ctx.fill();
    }
  }else if(type==='poison'){
    [sz,sz*.62,sz*.35].forEach((r,i)=>{
      ctx.strokeStyle=cols[i%3];ctx.lineWidth=3-i*.8;
      ctx.globalAlpha=.8-i*.2;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.stroke();
    });
  }else if(type==='rock'){
    ctx.fillStyle=cols[0];
    ctx.beginPath();ctx.moveTo(x-sz,y-sz*.3);ctx.lineTo(x-sz*.2,y-sz);
    ctx.lineTo(x+sz*.8,y-sz*.3);ctx.lineTo(x+sz,y+sz*.5);
    ctx.lineTo(x+sz*.1,y+sz);ctx.lineTo(x-sz*.8,y+sz*.6);ctx.closePath();ctx.fill();
  }else{
    ctx.fillStyle=cols[0];ctx.beginPath();ctx.arc(x,y,sz,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=cols[2];ctx.globalAlpha=.5;ctx.beginPath();ctx.arc(x-sz*.3,y-sz*.35,sz*.42,0,Math.PI*2);ctx.fill();
  }
  ctx.shadowBlur=0;ctx.globalAlpha=1;
}

function _drawPart(ctx,type,p){
  const sz=Math.max(0,p.sz*p.life);if(sz<=0.1)return;
  ctx.fillStyle=p.col;ctx.strokeStyle=p.col;
  if(type==='electric'){
    ctx.lineWidth=1.8*p.life;ctx.beginPath();
    ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-p.vx*3,p.y-p.vy*3);ctx.stroke();
    ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.1,sz*.5),0,Math.PI*2);ctx.fill();
  }else if(type==='psychic'){
    ctx.lineWidth=2*p.life;ctx.beginPath();ctx.arc(p.x,p.y,sz,0,Math.PI*2);ctx.stroke();
  }else if(type==='ice'||type==='rock'){
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.vx*.25);
    ctx.beginPath();ctx.moveTo(0,-sz);ctx.lineTo(sz*.5,0);ctx.lineTo(0,sz*.4);ctx.lineTo(-sz*.5,0);ctx.closePath();ctx.fill();
    ctx.restore();
  }else if(type==='ghost'||type==='poison'){
    ctx.shadowBlur=6;ctx.shadowColor=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.1,sz*.7),0,Math.PI*2);ctx.fill();
    ctx.lineWidth=1.5*p.life;ctx.beginPath();ctx.arc(p.x,p.y,sz,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;
  }else if(type==='grass'){
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.vx*.4);
    ctx.beginPath();ctx.ellipse(0,0,sz*.35,sz*.75,.3,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }else{
    ctx.beginPath();ctx.arc(p.x,p.y,sz,0,Math.PI*2);ctx.fill();
  }
}

function getEditingSlot(){return window._editDeckSlot||0;}

function switchDeckSlot(slot){
  window._editDeckSlot=slot;
  renderScreen('deck');
}

function activateDeck(slot){
  const raw=loadData();
  raw.activeDeck=slot;
  saveData(raw);
  showToast('✅ Deck '+(slot+1)+' ativado para batalha!',2000);
  renderScreen('deck');
}

function renameDeck(slot){
  // Show inline rename input instead of prompt() (blocked in iframes)
  const input=document.getElementById('rename-input-'+slot);
  if(input){
    const name=input.value.trim();
    if(name){
      const raw=loadData();
      if(raw.decks&&raw.decks[slot]){raw.decks[slot].name=name;saveData(raw);}
      showToast('✅ Deck renomeado para: '+name,2000);
      renderScreen('deck');
    }
  }
}

function showPokedexDetail(id){
  window._pdxDetail=id;
  renderScreen('pokedex');
}

function toggleDeck(id){
  const slot=getEditingSlot();
  const raw=loadData();
  if(!raw.decks||!raw.decks[slot])return;
  const cards=raw.decks[slot].cards;
  const cnt=cards.filter(x=>x===id).length;
  if(cnt>0){
    // Card already in deck → REMOVE one copy
    const idx=cards.lastIndexOf(id);if(idx>=0)cards.splice(idx,1);
  }else{
    // Card not in deck → ADD (if space and under 3 copies)
    if(cards.length>=20){showToast('Deck cheio! (máx 20 cards)');return;}
    cards.push(id);
  }
  saveData(raw);renderScreen('deck');
}

function saveDeck(){
  showToast('✅ Deck '+(getEditingSlot()+1)+' salvo!',1500);
  renderScreen('menu');
}

function exportSave(){
  const sv=getSave();
  return btoa(unescape(encodeURIComponent(JSON.stringify(sv))));
}

function importSave(code){
  try{
    const sv=JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
    if(typeof sv!=='object'||sv===null)throw new Error('invalid');
    saveData(sv);applyBackground();
    showToast('✅ Save importado com sucesso!',3000);
    renderScreen('menu');
  }catch(e){
    showToast('❌ Código inválido! Verifique e tente novamente.',3000);
  }
}

// ===== MENU MUSIC (original 8-bit composition) =====
let _bgmPlaying=false,_bgmTimeout=null,_bgmGain=null;

function startMenuMusic(){
  if(_bgmPlaying)return;
  AUD.boot();if(!AUD.ac)return;
  _bgmPlaying=true;
  if(!_bgmGain){_bgmGain=AUD.ac.createGain();_bgmGain.gain.value=0.22;_bgmGain.connect(AUD.ac.destination);}
  _playBGMLoop();
}

function stopMenuMusic(){
  _bgmPlaying=false;
  if(_bgmTimeout){clearTimeout(_bgmTimeout);_bgmTimeout=null;}
}

function _bgmNote(freq,start,dur,vol,wave='square'){
  if(!AUD.ac||freq<=0)return;
  const o=AUD.ac.createOscillator(),g=AUD.ac.createGain();
  o.type=wave;o.frequency.value=freq;
  g.gain.setValueAtTime(0,start);
  g.gain.linearRampToValueAtTime(vol*0.28,start+0.01);
  g.gain.setValueAtTime(vol*0.28,Math.max(start+0.01,start+dur-0.04));
  g.gain.linearRampToValueAtTime(0,start+dur);
  o.connect(g);g.connect(_bgmGain||AUD.ac.destination);
  o.start(start);o.stop(start+dur+0.05);
}

function _playBGMLoop(){
  if(!_bgmPlaying||!AUD.ac)return;
  const t=AUD.ac.currentTime+0.05;
  const B=0.18; // beat duration

  // === MELODY (square wave, bright) ===
  const mel=[
    // Phrase 1 - ascending fanfare
    [784,1],[880,1],[988,1],[880,.5],[784,.5],
    [659,2],[0,1],
    [784,1],[880,1],[1047,1],[988,.5],[880,.5],
    [784,3],[0,1],
    // Phrase 2 - playful run
    [523,1],[587,1],[659,1],[698,1],
    [784,2],[659,1],[523,1],
    [587,1],[659,1],[784,1],[880,1],
    [988,3],[0,1],
    // Phrase 3 - gentle rise
    [659,1],[784,1],[659,1],[523,1],
    [587,2],[0,1],[523,1],
    [659,1],[784,1],[880,1],[988,1],
    [1047,4],[0,2],
    // Phrase 4 - resolution
    [880,1],[784,1],[659,1],[784,1],
    [880,2],[659,1],[523,1],
    [587,1],[659,1],[784,1],[659,.5],[587,.5],
    [523,4],[0,2],
  ];

  // === BASS (triangle wave, warm) ===
  const bas=[
    [262,2],[330,2],[392,2],[330,2],
    [262,2],[294,2],[330,2],[262,2],
    [262,2],[330,2],[392,2],[440,2],
    [392,2],[330,2],[294,2],[262,2],
    [349,2],[330,2],[294,2],[262,2],
    [330,2],[262,2],[294,2],[330,2],
    [349,2],[392,2],[440,2],[392,2],
    [262,4],[262,4],
  ];

  // === ARPEGGIO (high square, sparkle) ===
  const arp=[
    [1047,.5],[1319,.5],[1047,.5],[1319,.5],
    [988,.5],[1175,.5],[988,.5],[1175,.5],
    [1047,.5],[1319,.5],[1047,.5],[1319,.5],
    [880,.5],[1047,.5],[880,.5],[1047,.5],
  ];

  let mt=t;
  for(const[f,b]of mel){_bgmNote(f,mt,b*B*.88,.9);mt+=b*B;}

  let bt=t;
  for(const[f,b]of bas){_bgmNote(f,bt,b*B*.75,.7,'triangle');bt+=b*B;}

  // Arpeggio repeats over full loop
  const totalBeats=mel.reduce((s,[,b])=>s+b,0);
  let at=t;
  while(at<t+totalBeats*B-0.5){
    for(const[f,b]of arp){
      _bgmNote(f,at,b*B*.5,.35,'sine');
      at+=b*B;
      if(at>=t+totalBeats*B)break;
    }
  }

  const loopMs=totalBeats*B*1000-150;
  _bgmTimeout=setTimeout(()=>{if(_bgmPlaying)_playBGMLoop();},loopMs);
}

// ===== MUTE SYSTEM =====
function isMuted(){return localStorage.getItem('pkm_muted')==='1';}
function toggleMute(){
  const muted=!isMuted();
  localStorage.setItem('pkm_muted',muted?'1':'0');
  // music disabled - SFX only
  // Re-render menu to update button
  const btn=document.getElementById('mute-btn');
  if(btn){btn.textContent=muted?'🔇 Mudo':'🔊 Som';}
}

// ===== PRIZE REVEAL SCREEN =====
let _lastPrizes=[];

function renderPrizeList(app){
  const prizeIds=_lastPrizes||[];
  const sv=getSave();
  const owned=new Set([...(sv.unlocked||[]),...DEFAULT_IDS]);

  // Build display info for each prize
  const prizeCards=prizeIds.map(id=>{
    const b=byId(id);
    if(!b)return null;
    const isNew=!owned.has(id)||prizeIds.indexOf(id)<prizeIds.lastIndexOf(id);
    const copies=(sv.copies||{})[id]||0;
    return{b,id,isNew,copies};
  }).filter(Boolean);

  const newCount=prizeCards.filter(p=>p.isNew).length;
  const dupCount=prizeCards.length-newCount;

  // Build cards HTML using string concat to avoid quote issues
  function prizeCardHtml(p){
    const b=p.b;
    const tc=typeColor(b.type);
    const rarityLabels=['COMUM','RARA','ÉPICA','LENDÁRIA'];
    const rarityColors=['#aaa','#44aaff','#cc44ff','#f0c040'];
    const ri=b.r||0;
    const borderColor=p.isNew?tc:'#333';
    const label=p.isNew?'🆕 NOVA!':'📦 CÓPIA+'+(p.copies);
    const labelColor=p.isNew?'#44ff88':'#ffaa44';
    const sprite=getSpriteUrl(b.id)
      ?'<img src="'+getSpriteUrl(b.id)+'" style="width:60px;height:60px;image-rendering:pixelated;object-fit:contain">'
      :'<canvas width=32 height=32 id="pr_'+b.id+'" style="image-rendering:pixelated;width:48px;height:48px"></canvas>';
    return '<div style="background:'+(p.isNew?'linear-gradient(160deg,'+tc+'22 0%,#0a0a1a 60%)':'#0a0a0a')+';'
      +'border:2px solid '+borderColor+';border-radius:10px;padding:8px;'
      +'display:flex;flex-direction:column;align-items:center;gap:2px;'
      +'box-shadow:'+(p.isNew?'0 0 12px '+tc+'44':'none')+'">'
      +'<div style="font-size:.5em;color:'+labelColor+';font-weight:bold;background:rgba(0,0,0,.4);border-radius:4px;padding:1px 4px">'+label+'</div>'
      +sprite
      +'<div style="font-size:.52em;color:'+tc+';font-weight:bold;text-align:center;font-family:var(--pf,monospace);line-height:1.3">'+b.name+'</div>'
      +'<div style="font-size:.5em;color:'+rarityColors[ri]+';font-weight:bold">'+rarityLabels[ri]+'</div>'
      +'<div style="font-size:.5em;color:#888">'+(TINFO[b.type]||{e:'?'}).e+' '+b.type+'</div>'
      +'<div style="font-size:.5em;color:#aaa">⚔'+b.atk+' 🛡'+b.def+'</div>'
      +'</div>';
  }

  app.innerHTML='<div style="padding:14px;background:#080816;min-height:100vh">'
    +'<div style="text-align:center;margin-bottom:12px">'
    +'<div style="font-size:2em;margin-bottom:6px">🏆</div>'
    +'<div style="font-size:1.1em;color:#f0c040;font-weight:bold;font-family:var(--pf,monospace);margin-bottom:4px">Torneio Vencido!</div>'
    +'<div style="display:flex;justify-content:center;gap:12px;font-size:.75em;margin:6px 0">'
    +(newCount>0?'<span style="color:#44ff88">🆕 '+newCount+' nova'+(newCount!==1?'s':'')+'</span>':'')
    +(dupCount>0?'<span style="color:#ffaa44">📦 '+dupCount+' cópia'+(dupCount!==1?'s':'')+'</span>':'')
    +(prizeCards.length===0?'<span style="color:#666">Nenhuma carta desta vez</span>':'')
    +'</div></div>'
    +(prizeCards.length>0
      ?'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">'
        +prizeCards.map(prizeCardHtml).join('')
        +'</div>'
        +'<div style="font-size:.65em;color:#555;text-align:center;margin-bottom:12px">📦 Cópias extras vão para Melhorias</div>'
      :'<div style="color:#555;text-align:center;margin:20px 0">Continue jogando para desbloquear mais!</div>'
    )
    +'<div style="display:flex;flex-direction:column;gap:8px">'
    +'<button class="btn btn-main" data-s="result" onclick="renderScreen(this.dataset.s)">✅ Continuar</button>'
    +'<button class="btn btn-alt" data-s="menu" onclick="renderScreen(this.dataset.s)">🏠 Menu</button>'
    +'<button class="btn btn-alt" data-s="deck" onclick="renderScreen(this.dataset.s)" style="font-size:.75em">🃏 Montar Deck</button>'
    +'<button class="btn btn-alt" data-s="upgrade" onclick="renderScreen(this.dataset.s)" style="font-size:.75em">⬆️ Ver Melhorias</button>'
    +'</div></div>';

  setTimeout(()=>{
    prizeCards.forEach(p=>{
      const cv=document.getElementById('pr_'+p.b.id);
      if(cv&&cv.tagName==='CANVAS')drawSprite(cv,p.b.id);
    });
  },30);
}

function applyPassive(card,fieldSlot,defField,defWho,dmg){
  if(!card||!card.id)return dmg;
  const p=PASSIVES[card.id];if(!p)return dmg;
  if(card.id==='mewtwo')return Math.floor(dmg*1.15);
  if(card.id==='lugia')return Math.floor(dmg*1.25);
  if(card.id==='umbreon'&&defWho==='p'){
    // reflect handled in doAttack
  }
  return dmg;
}
function checkPassiveOnHit(attacker,target,defField,slotIdx,defWho,dmg){
  if(!target||!target.id)return;
  // Magikarp rage
  if(target.id==='magikarp'&&target.hp>0){target.atk=Math.min(1800,(target.atk||200)+80);addLog(`🐟 ${target.name} fica furioso! ATK+80`);}
  // Dragonite multiscale
  if(target.id==='dragonite'&&!target._multiscaleUsed){target._multiscaleUsed=true;addLog(`🐉 Multiscale absorve parte do dano!`);}
  // Umbreon reflect
  if(target.id==='umbreon'&&dmg>0){
    const reflected=Math.floor(dmg*0.15);
    if(defWho==='e'){G.pHP=Math.max(0,G.pHP-reflected);addLog(`🌑 Umbreon reflete ${reflected} dano!`);}
    else{G.eHP=Math.max(0,G.eHP-reflected);addLog(`🌑 Umbreon reflete ${reflected} dano!`);}
  }
  // Moltres/Ho-Oh phoenix
  if((target.id==='moltres'||target.id==='ho_oh')&&target.hp<=0&&!target._revived){
    const revHP=Math.floor((target.maxHp||target.def||1)*( target.id==='ho_oh'?.5:.3));
    target.hp=revHP;target._revived=true;
    defField[slotIdx]=target;
    addLog(`🔥 ${target.name} ressuscita com ${revHP} HP!`);
    AUD.evolve&&AUD.evolve();
  }
}
function processPassiveTurn(field,isPlayer){
  const side=isPlayer?'Seu':'IA -';
  field.forEach((card,i)=>{
    if(!card||card.hp<=0)return;
    // Chansey heal
    if(card.id==='chansey'){
      if(isPlayer){G.pHP=Math.min(G.maxPHP,G.pHP+80);addLog(`🩷 ${side} Chansey [Cura Natural]: +80 LP!`);}
      else{G.eHP=Math.min(G.maxEHP,G.eHP+80);addLog('🩷 IA Chansey [Cura Natural]: +80 LP!');}
    }
    // Lapras clear status
    if(card.id==='lapras'&&card.status&&Object.keys(card.status).length>0){
      card.status={};addLog(`💧 ${side} Lapras [Hidratação]: status removidos!`);
    }
    // Alakazam ATK up (max 3x)
    if(card.id==='alakazam'){
      if(!card._atkUpCount)card._atkUpCount=0;
      if(card._atkUpCount<3){
        card.atk=(card.atk||1200)+80;card._atkUpCount++;
        addLog(`🔮 ${side} Alakazam [Amplificar]: ATK +80 (${card._atkUpCount}/3)!`);
      }
    }
    // Moltres log if revived this turn
    if((card.id==='moltres'||card.id==='ho_oh')&&card._revived&&!card._reviveLogged){
      card._reviveLogged=true;
      addLog(`🔥 ${side} ${card.name} [${card.id==='ho_oh'?'Sagrado':'Fênix'}]: ressuscitou!`);
    }

  });
}

// ===== WEATHER SYSTEM =====
function getWeather(field){
  const types=field.filter(c=>c&&c.hp>0).map(c=>c.type);
  if(types.length<3)return null;
  const dominant=types.reduce((acc,t)=>{acc[t]=(acc[t]||0)+1;return acc;},{});
  for(const [type,count] of Object.entries(dominant)){if(count>=3)return type;}
  return null;
}
const WEATHER_INFO={fire:{icon:'☀️',name:'Sol Intenso',bonus:'fire'},water:{icon:'🌧️',name:'Chuva',bonus:'water'},grass:{icon:'🌿',name:'Floresta Densa',bonus:'grass'},electric:{icon:'⛈️',name:'Tempestade',bonus:'electric'},ice:{icon:'❄️',name:'Nevasca',bonus:'ice'},psychic:{icon:'🌀',name:'Névoa Psíquica',bonus:'psychic'},ghost:{icon:'🌑',name:'Escuridão',bonus:'ghost'},rock:{icon:'🏔️',name:'Terreno Rochoso',bonus:'rock'}};
function getWeatherBonus(atkType){
  const pW=getWeather(G.pField),eW=getWeather(G.eField);
  if(pW===atkType||eW===atkType)return 1.12; // +12% por clima
  return 1;
}

// ===== SHINY SYSTEM =====
function isShiny(id){const sv=getSave();return(sv.shinies||[]).includes(id);}
function rollShiny(id,sv){
  if(Math.random()<0.05){
    if(!sv.shinies)sv.shinies=[];
    if(!sv.shinies.includes(id)){sv.shinies.push(id);return true;}
  }
  return false;
}

// ===== WIN STREAK =====
function updateStreak(win){
  const raw=loadData();
  if(win){raw.winStreak=(raw.winStreak||0)+1;raw.bestStreak=Math.max(raw.bestStreak||0,raw.winStreak);}
  else{raw.winStreak=0;}
  saveData(raw);
  return raw.winStreak||0;
}

const MISSION_POOL=[
  {id:'win2',name:'Vença 2 batalhas',target:2,reward:60,track:'wins'},
  {id:'win5',name:'Vença 5 batalhas',target:5,reward:120,track:'wins'},

  {id:'tourney1',name:'Complete um Torneio',target:1,reward:180,track:'tourneys'},
  {id:'perfect',name:'Vença sem perder Pokémon',target:1,reward:120,track:'perfectWin'},
  {id:'upgrade1',name:'Melhore um Pokémon',target:1,reward:200,track:'upgrades'},
  {id:'shiny',name:'Consiga um Shiny',target:1,reward:500,track:'newShiny'},
];
function getTodayKey(){const d=new Date();return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;}
function getDailyMissions(){
  const raw=loadData();const today=getTodayKey();
  if(raw.dailyDate!==today||!raw.dailyMissions){
    // Pick 3 missions for today using date as seed
    const d=new Date();const seed=d.getFullYear()*10000+d.getMonth()*100+d.getDate();
    const picks=[];const used=new Set();
    for(let i=0;i<3;i++){
      let idx=((seed*(i+7)*31+i*13)%MISSION_POOL.length+MISSION_POOL.length)%MISSION_POOL.length;
      while(used.has(idx))idx=(idx+1)%MISSION_POOL.length;
      used.add(idx);picks.push(MISSION_POOL[idx].id);
    }
    raw.dailyDate=today;raw.dailyMissions=picks;raw.dailyProgress=[0,0,0];raw.dailyDone=[false,false,false];
    saveData(raw);
  }
  return {missions:raw.dailyMissions||[],progress:raw.dailyProgress||[0,0,0],done:raw.dailyDone||[false,false,false]};
}
function updateDailyProgress(track,amount=1){
  const raw=loadData();const today=getTodayKey();
  if(raw.dailyDate!==today)return getDailyMissions();
  const {missions,progress,done}=getDailyMissions();
  missions.forEach((mid,i)=>{
    if(done[i])return;
    const m=MISSION_POOL.find(x=>x.id===mid);
    if(!m||m.track!==track)return;
    raw.dailyProgress[i]=(raw.dailyProgress[i]||0)+amount;
    if(raw.dailyProgress[i]>=m.target&&!raw.dailyDone[i]){
      raw.dailyDone[i]=true;
      raw.totalDaily=(raw.totalDaily||0)+1;
      const lvUp=addXP(m.reward);
      setTimeout(()=>showToast(`📅 Missão: ${m.name} ✅ +${m.reward} XP!`,3000),500);
    }
  });
  saveData(raw);
}

function getUpgrade(id){const raw=loadData();return(raw.upgrades||{})[id]||0;}
function applyUpgradeToCard(card){
  const lv=getUpgrade(card.id);
  if(lv>0){card.atk+=lv*200;card.def+=lv*200;card.hp+=lv*200;card.maxHp=(card.maxHp||card.def)+lv*200;}
  return card;
}
function upgradeCard(id){
  const raw=loadData();if(!raw.upgrades)raw.upgrades={};
  const cur=raw.upgrades[id]||0;
  if(cur>=1){showToast('Este Pokémon já foi melhorado! (máx 1x)');return;}
  const cost=200;
  if((raw.xp||0)<cost){showToast(`XP insuficiente! Precisa ${cost} XP`);return;}
  raw.xp-=cost;raw.upgrades[id]=1;
  saveData(raw);
  showToast(`⬆️ ${byId(id)?.name} melhorado! +100 ATK/DEF/HP`,2500);
  AUD.evolve&&AUD.evolve();
  updateDailyProgress('upgrades',1);
  checkAchievements();
  renderScreen('upgrade');
}

function doUpgrade(id){
  const sv=getSave();
  if(!sv.upgrades)sv.upgrades={};
  if(!sv.copies)sv.copies={};
  const lvl=sv.upgrades[id]||0;
  if(lvl>=3)return;
  const needed=[0,2,3,4][lvl+1];
  const have=sv.copies[id]||0;
  if(have<needed){showToast('Precisa de '+needed+' cópias!',2000);return;}
  sv.copies[id]=have-needed;
  sv.upgrades[id]=lvl+1;
  saveData(sv);
  showToast('⭐ '+byId(id)?.name+' evoluído para nível '+(lvl+1)+'!',2500);
  renderScreen('upgrade');
}

function checkVersionOnLoad() {

  if (!('serviceWorker' in navigator)) return;
  // Registra SW - sem forçar reload (evita loop)
  navigator.serviceWorker.register('./service-worker.js')
    .then(reg => {
      // Poll a cada 5min para verificar updates em background
      setInterval(() => reg.update(), 300000);
    }).catch(()=>{});
}



function installUpdate() {
  if (!('serviceWorker' in navigator)) {
    showToast('Limpando cache e recarregando...', 2000);
    caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))).then(() => location.reload(true));
    return;
  }
  navigator.serviceWorker.getRegistration().then(reg => {
    showToast('⬇️ Instalando atualização...', 2000);
    // Force cache clear + reload regardless
    caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))).then(() => {
      if (reg && reg.waiting) {
        navigator.serviceWorker.addEventListener('controllerchange', () => location.reload(true));
        reg.waiting.postMessage('skipWaiting');
      } else {
        setTimeout(() => location.reload(true), 800);
      }
    });
  });
}

  G.attackingSlot=-1;
  G.busy=true;
  AUD.attack&&AUD.attack(card.type);

  doAttack(card,G.eField,'e',targetSlot);
  checkDeath();
  G.atkd.add(atkSlot);
  G.busy=false;
  renderScreen('game');
}

function discardCard(handIdx){
  if(G.busy||G.phase!=='player')return;
  if(G.discardedThisTurn){showToast('Já descartou uma carta este turno!',1500);return;}
  if(G.pHand.length===0)return;
  const card=G.pHand[handIdx];
  if(!card)return;
  // Double-tap to confirm (confirm() is blocked in iframe)
  if(G.pendingDiscard===handIdx){
    G.pHand.splice(handIdx,1);
    G.pDeck.unshift(card);
    G.discardedThisTurn=true;
    G.pendingDiscard=-1;
    G.selHand=-1;
    drawCard('p');
    addLog(`♻️ Descartou ${card.name} e comprou nova carta.`);
    showToast('♻️ '+card.name+' descartado! Nova carta comprada.',2000);
    renderScreen('game');
  }else{
    G.pendingDiscard=handIdx;
    showToast('♻️ Toque novamente em ♻ para confirmar descarte de '+card.name,2500);
    setTimeout(()=>{if(G.pendingDiscard===handIdx){G.pendingDiscard=-1;renderScreen('game');}},3000);
    renderScreen('game');
  }
}

function _deckScrollPos(){
  const el=document.getElementById('deck-card-list');
  return el?el.scrollTop:0;
}
function _restoreDeckScroll(pos){
  setTimeout(()=>{const el=document.getElementById('deck-card-list');if(el)el.scrollTop=pos;},10);
}

function addToDeck(id){
  const slot=getEditingSlot();
  const raw=loadData();
  if(!raw.decks||!raw.decks[slot])return;
  const cards=raw.decks[slot].cards;
  if(cards.length>=20){showToast('Deck cheio! Máx 20 cards.',1500);return;}
  const b=byId(id);const maxCopies=b&&b.r>=3?1:b&&b.r>=2?2:3;
  if(cards.filter(x=>x===id).length>=maxCopies){showToast('Máx '+maxCopies+' cóp'+(maxCopies===1?'ia':'ias')+' de '+(b?.r>=3?'Lendários':'Épicos')+'!',2000);return;}
  const scroll=_deckScrollPos();
  cards.push(id);
  saveData(raw);renderScreen('deck');
  _restoreDeckScroll(scroll);
}

function removeFromDeck(id){
  const slot=getEditingSlot();
  const raw=loadData();
  if(!raw.decks||!raw.decks[slot])return;
  const cards=raw.decks[slot].cards;
  const idx=cards.lastIndexOf(id);
  const scroll=_deckScrollPos();
  if(idx>=0){cards.splice(idx,1);saveData(raw);}
  renderScreen('deck');
  _restoreDeckScroll(scroll);
}

// ===== BATTLE MUSIC (original composition - energetic) =====
let _battleMusicPlaying=false,_battleMusicTimeout=null,_battleGain=null;

function startBattleMusic(){
  if(_battleMusicPlaying||isMuted())return;
  AUD.boot();if(!AUD.ac)return;
  _battleMusicPlaying=true;
  if(!_battleGain){_battleGain=AUD.ac.createGain();_battleGain.gain.value=0.18;_battleGain.connect(AUD.ac.destination);}
  _playBattleLoop();
}
function stopBattleMusic(){
  _battleMusicPlaying=false;
  if(_battleMusicTimeout){clearTimeout(_battleMusicTimeout);_battleMusicTimeout=null;}
}
function _btNote(f,t,d,v,w='square'){
  if(!AUD.ac||f<=0||isMuted())return;
  const o=AUD.ac.createOscillator(),g=AUD.ac.createGain();
  o.type=w;o.frequency.value=f;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(v*0.3,t+0.01);
  g.gain.setValueAtTime(v*0.3,Math.max(t+0.01,t+d-0.03));
  g.gain.linearRampToValueAtTime(0,t+d);
  o.connect(g);g.connect(_battleGain||AUD.ac.destination);
  o.start(t);o.stop(t+d+0.05);
}
function _btDrum(t,v=0.25){
  if(!AUD.ac||isMuted())return;
  const buf=AUD.ac.createBuffer(1,Math.floor(AUD.ac.sampleRate*0.08),AUD.ac.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/500);
  const src=AUD.ac.createBufferSource();src.buffer=buf;
  const g=AUD.ac.createGain();g.gain.setValueAtTime(v*0.5,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.08);
  src.connect(g);g.connect(_battleGain||AUD.ac.destination);
  src.start(t);src.stop(t+0.1);
}
function _playBattleLoop(){
  if(!_battleMusicPlaying||!AUD.ac)return;
  const t=AUD.ac.currentTime+0.05;
  const B=0.14; // faster beat = 170 BPM

  // MELODY - energetic battle theme
  const mel=[
    [988,1],[988,1],[880,.5],[784,.5],[880,2],[0,1],
    [784,1],[784,1],[698,.5],[659,.5],[698,2],[0,1],
    [880,1],[988,1],[1047,1],[988,.5],[880,.5],
    [784,2],[659,1],[523,1],
    [659,1],[784,1],[880,1],[988,1],
    [1047,3],[0,1],
    [1047,1],[988,1],[880,1],[784,1],
    [988,4],[0,2],
  ];
  // BASS
  const bas=[
    [196,2],[196,2],[175,2],[165,2],
    [196,2],[175,2],[165,2],[147,2],
    [196,2],[220,2],[247,2],[220,2],
    [196,4],[196,4],
  ];
  // RHYTHM arpeggio
  const arp=[
    [494,.5],[588,.5],[784,.5],[988,.5],
    [440,.5],[523,.5],[659,.5],[880,.5],
  ];

  let mt=t;
  for(const[f,b]of mel){_btNote(f,mt,b*B*.82,.9);mt+=b*B;}
  let bt2=t;
  for(const[f,b]of bas){_btNote(f,bt2,b*B*.7,.7,'triangle');bt2+=b*B;}
  // Drums on beats
  const totalB=mel.reduce((s,[,b])=>s+b,0);
  for(let i=0;i<totalB;i+=2)_btDrum(t+i*B,.3);
  for(let i=1;i<totalB;i+=4)_btDrum(t+i*B,.15);
  // Arp loop
  let at=t;
  while(at<t+totalB*B-0.3){
    for(const[f,b]of arp){_btNote(f,at,b*B*.45,.3,'sine');at+=b*B;if(at>=t+totalB*B)break;}
  }
  const loopMs=totalB*B*1000-120;
  _battleMusicTimeout=setTimeout(()=>{if(_battleMusicPlaying)_playBattleLoop();},loopMs);
}

// ===== EVOLUTION FLASH =====
function triggerEvoFlash(slotIdx){
  // 1. Glow the field slot sprite
  const slot=document.querySelector(`.field-slot[data-who="p"][data-slot="${slotIdx??0}"]`);
  if(slot){
    slot.classList.add('evo-slot-anim');
    setTimeout(()=>slot.classList.remove('evo-slot-anim'),950);
  }
  // 2. Burst rings from slot center
  const r=slot?.getBoundingClientRect();
  if(r){
    const cx=r.left+r.width/2, cy=r.top+r.height/2;
    // 3 rings expanding outward
    [0,150,300].forEach((delay,i)=>{
      setTimeout(()=>{
        const ring=document.createElement('div');
        ring.style.cssText=`position:fixed;left:${cx}px;top:${cy}px;
          width:${40+i*20}px;height:${40+i*20}px;
          border:4px solid #ffffff;border-radius:50%;
          pointer-events:none;z-index:9996;
          animation:evoRing .6s ease forwards;`;
        document.body.appendChild(ring);
        setTimeout(()=>ring.remove(),700);
      },delay);
    });
    // Star burst particles
    for(let i=0;i<8;i++){
      setTimeout(()=>{
        const star=document.createElement('div');
        const angle=(i/8)*Math.PI*2;
        const dist=50+Math.random()*30;
        star.style.cssText=`position:fixed;left:${cx}px;top:${cy}px;
          font-size:1.2em;pointer-events:none;z-index:9997;
          transform:translate(-50%,-50%);
          transition:all .5s ease-out;opacity:1;`;
        star.textContent='✨';
        document.body.appendChild(star);
        requestAnimationFrame(()=>{
          star.style.left=(cx+Math.cos(angle)*dist)+'px';
          star.style.top=(cy+Math.sin(angle)*dist)+'px';
          star.style.opacity='0';
          star.style.fontSize='.4em';
        });
        setTimeout(()=>star.remove(),600);
      },i*30);
    }
    // Center flash (small, not full screen)
    const flash=document.createElement('div');
    flash.style.cssText=`position:fixed;left:${cx}px;top:${cy}px;
      width:120px;height:120px;border-radius:50%;
      background:radial-gradient(circle,rgba(255,255,255,.9),rgba(255,255,255,0));
      transform:translate(-50%,-50%) scale(0);
      pointer-events:none;z-index:9995;
      transition:transform .25s ease-out,opacity .4s .2s;`;
    document.body.appendChild(flash);
    requestAnimationFrame(()=>{flash.style.transform='translate(-50%,-50%) scale(1)';});
    setTimeout(()=>{flash.style.opacity='0';},300);
    setTimeout(()=>flash.remove(),700);
  }
}

// ===== ATTACK TRAIL PARTICLES =====
function spawnTrailParticles(fromWho, fromSlot, toWho, toSlot, color){
  const fromEl=document.getElementById(`fs_${fromWho}${fromSlot}`);
  const toEl=document.getElementById(`fs_${toWho}${toSlot}`);
  if(!fromEl||!toEl)return;
  const fr=fromEl.getBoundingClientRect();
  const tr=toEl.getBoundingClientRect();
  const fx=fr.left+fr.width/2, fy=fr.top+fr.height/2;
  const tx=tr.left+tr.width/2, ty=tr.top+tr.height/2;
  for(let i=0;i<8;i++){
    setTimeout(()=>{
      const p=document.createElement('div');
      p.className='atk-particle';
      const prog=i/8;
      const x=fx+(tx-fx)*prog+( Math.random()-0.5)*20;
      const y=fy+(ty-fy)*prog+(Math.random()-0.5)*20;
      p.style.cssText+=`left:${x}px;top:${y}px;background:${color};
        --tx:${(tx-x)*0.3}px;--ty:${(ty-y)*0.3}px;
        width:${8-i}px;height:${8-i}px;`;
      document.body.appendChild(p);
      setTimeout(()=>p.remove(),600);
    },i*40);
  }
}

function playWeatherSound(type){
  AUD.boot();if(!AUD.ac||isMuted())return;
  const t=AUD.ac.currentTime;
  if(type==='electric'){
    // Thundercrack: noise burst + rumble
    const buf=AUD.ac.createBuffer(1,AUD.ac.sampleRate*.4,AUD.ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/6000)*(i<500?i/500:1);
    const src=AUD.ac.createBufferSource();src.buffer=buf;
    const g=AUD.ac.createGain();g.gain.setValueAtTime(.35,t);g.gain.exponentialRampToValueAtTime(.001,t+.4);
    src.connect(g);g.connect(AUD.ac.destination);src.start(t);
    // Low rumble
    const o=AUD.ac.createOscillator(),g2=AUD.ac.createGain();
    o.type='sawtooth';o.frequency.setValueAtTime(80,t);o.frequency.exponentialRampToValueAtTime(40,t+.5);
    g2.gain.setValueAtTime(.08,t);g2.gain.exponentialRampToValueAtTime(.001,t+.5);
    o.connect(g2);g2.connect(AUD.ac.destination);o.start(t);o.stop(t+.5);
  }else if(type==='water'){
    // Rain drops: multiple short noise bursts
    for(let i=0;i<6;i++){
      setTimeout(()=>{
        if(!AUD.ac||isMuted())return;
        const t2=AUD.ac.currentTime;
        const buf=AUD.ac.createBuffer(1,AUD.ac.sampleRate*.05,AUD.ac.sampleRate);
        const d=buf.getChannelData(0);
        for(let j=0;j<d.length;j++)d[j]=(Math.random()*2-1)*Math.exp(-j/400);
        const src=AUD.ac.createBufferSource();src.buffer=buf;
        const g=AUD.ac.createGain();g.gain.value=.08+Math.random()*.06;
        src.connect(g);g.connect(AUD.ac.destination);src.start(t2);
      },i*120+Math.random()*80);
    }
  }else if(type==='grass'){
    // Nature sounds - gentle chime
    [[523,.08],[659,.07],[784,.09],[1047,.1]].forEach(([f,d],i)=>{
      const o=AUD.ac.createOscillator(),g=AUD.ac.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(.06,t+i*.12);g.gain.exponentialRampToValueAtTime(.001,t+i*.12+d+.2);
      o.connect(g);g.connect(AUD.ac.destination);o.start(t+i*.12);o.stop(t+i*.12+d+.25);
    });
  }else if(type==='fire'){
    // EXPLOSION: low thump + noise burst + mid decay
    // Thump
    const o=AUD.ac.createOscillator(),g=AUD.ac.createGain();
    o.type='sine';o.frequency.setValueAtTime(120,t);o.frequency.exponentialRampToValueAtTime(30,t+.3);
    g.gain.setValueAtTime(.5,t);g.gain.exponentialRampToValueAtTime(.001,t+.35);
    o.connect(g);g.connect(AUD.ac.destination);o.start(t);o.stop(t+.4);
    // Noise burst
    const buf=AUD.ac.createBuffer(1,AUD.ac.sampleRate*.5,AUD.ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/5000)*(i<1000?i/1000:1);
    const src=AUD.ac.createBufferSource();src.buffer=buf;
    const ng=AUD.ac.createGain();ng.gain.setValueAtTime(.4,t);ng.gain.exponentialRampToValueAtTime(.001,t+.5);
    src.connect(ng);ng.connect(AUD.ac.destination);src.start(t);
    // Mid frequency decay
    const o2=AUD.ac.createOscillator(),g2=AUD.ac.createGain();
    o2.type='sawtooth';o2.frequency.setValueAtTime(400,t+.05);o2.frequency.exponentialRampToValueAtTime(100,t+.4);
    g2.gain.setValueAtTime(.15,t+.05);g2.gain.exponentialRampToValueAtTime(.001,t+.4);
    o2.connect(g2);g2.connect(AUD.ac.destination);o2.start(t+.05);o2.stop(t+.45);
  }else if(type==='ice'){
    // Ice chime: high pitched notes
    [[1760,.1],[2093,.08],[2637,.1]].forEach(([f,d],i)=>{
      const o=AUD.ac.createOscillator(),g=AUD.ac.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(.08,t+i*.1);g.gain.exponentialRampToValueAtTime(.001,t+i*.1+d+.15);
      o.connect(g);g.connect(AUD.ac.destination);o.start(t+i*.1);o.stop(t+i*.1+d+.2);
    });
  }
}

function spawnTypeEffect(fromEl, toEl, type){
  const te = TYPE_EFFECTS[type] || TYPE_EFFECTS.normal;
  const fr = fromEl.getBoundingClientRect();
  const tr = toEl.getBoundingClientRect();
  const fx=fr.left+fr.width/2, fy=fr.top+fr.height/2;
  const tx=tr.left+tr.width/2, ty=tr.top+tr.height/2;

  // ---- PROJECTILE: emoji traveling from attacker to target ----
  const proj=document.createElement('div');
  proj.style.cssText=`position:fixed;left:${fx}px;top:${fy}px;font-size:1.6em;pointer-events:none;z-index:9994;
    transition:left .25s cubic-bezier(.25,.46,.45,.94),top .25s cubic-bezier(.25,.46,.45,.94),transform .25s;
    transform:translate(-50%,-50%);`;
  proj.textContent=te.emoji[0];
  document.body.appendChild(proj);
  requestAnimationFrame(()=>{
    proj.style.left=tx+'px';
    proj.style.top=ty+'px';
    proj.style.transform='translate(-50%,-50%) scale(1.5)';
  });
  setTimeout(()=>proj.remove(),300);

  // ---- IMPACT BURST on target ----
  setTimeout(()=>{
    const colors=[te.color,te.color+'aa','#ffffff'];
    
    if(te.shape==='fire'){
      // Fire: burst of flame emojis
      for(let i=0;i<8;i++){
        const p=document.createElement('div');
        const angle=(i/8)*Math.PI*2;
        const dist=30+Math.random()*40;
        p.style.cssText=`position:fixed;left:${tx}px;top:${ty}px;font-size:${.8+Math.random()*.6}em;
          pointer-events:none;z-index:9994;transform:translate(-50%,-50%);
          transition:left .4s ease-out,top .4s ease-out,opacity .4s;opacity:1;`;
        p.textContent=['🔥','💥','🔥'][Math.floor(Math.random()*3)];
        document.body.appendChild(p);
        requestAnimationFrame(()=>{
          p.style.left=(tx+Math.cos(angle)*dist)+'px';
          p.style.top=(ty+Math.sin(angle)*dist)+'px';
          p.style.opacity='0';
        });
        setTimeout(()=>p.remove(),500);
      }
      // Fire ring
      const ring=document.createElement('div');
      ring.style.cssText=`position:fixed;left:${tx}px;top:${ty}px;width:60px;height:60px;
        border:3px solid #ff4400;border-radius:50%;pointer-events:none;z-index:9993;
        transform:translate(-50%,-50%) scale(0);transition:transform .3s ease-out,opacity .3s;
        box-shadow:0 0 20px #ff4400,inset 0 0 10px #ff8800;`;
      document.body.appendChild(ring);
      requestAnimationFrame(()=>{ring.style.transform='translate(-50%,-50%) scale(2)';ring.style.opacity='0';});
      setTimeout(()=>ring.remove(),400);

    }else if(te.shape==='water'){
      // Water: droplets splashing outward
      for(let i=0;i<10;i++){
        const p=document.createElement('div');
        const angle=(i/10)*Math.PI*2;
        const dist=25+Math.random()*35;
        p.style.cssText=`position:fixed;left:${tx}px;top:${ty}px;font-size:${.7+Math.random()*.5}em;

          transition:all .45s ease-out;opacity:1;`;
        p.textContent='💧';
        document.body.appendChild(p);
        requestAnimationFrame(()=>{
          p.style.left=(tx+Math.cos(angle)*dist)+'px';
          p.style.top=(ty+Math.sin(angle)*dist)+'px';

      }
      // Wave ring

    }else if(te.shape==='electric'){

        setTimeout(()=>{

          p.style.cssText=`position:fixed;left:${tx+(Math.random()-0.5)*60}px;top:${ty+(Math.random()-0.5)*60}px;

function buildArenaBg(type){
  const colors={
    fire:'220,60,0',water:'0,80,200',grass:'0,140,60',electric:'200,160,0',
    psychic:'180,0,120',ghost:'80,40,180',dragon:'40,80,220',ice:'0,140,180',
    rock:'140,100,60',poison:'120,40,200',fighting:'160,60,0',normal:'60,80,120'
  };
  const rgb=colors[type]||'60,80,120';
  const svg=`<svg xmlns='http://www.w3.org/2000/svg' width='460' height='800'>
    <!-- Enemy half -->
    <rect width='460' height='390' fill='rgb(${rgb})' opacity='.12'/>
    <rect width='460' height='1' y='0' fill='rgb(${rgb})' opacity='.4'/>
    <!-- Player half -->
    <rect y='400' width='460' height='400' fill='rgb(20,60,180)' opacity='.1'/>
    <rect y='799' width='460' height='1' fill='rgb(20,60,180)' opacity='.4'/>
    <!-- Divider -->
    <rect y='393' width='460' height='14' fill='url(#dg)'/>
    <defs>
      <linearGradient id='dg' x1='0' y1='0' x2='0' y2='1'>
        <stop offset='0%' stop-color='rgb(${rgb})' stop-opacity='.15'/>
        <stop offset='50%' stop-color='white' stop-opacity='.06'/>
        <stop offset='100%' stop-color='rgb(20,60,180)' stop-opacity='.12'/>
      </linearGradient>
    </defs>

  </svg>`;
  return 'url("data:image/svg+xml,'+encodeURIComponent(svg)+'")';
}

function getEffectCanvas(){
  if(!_effectCanvas){
    _effectCanvas=document.createElement('canvas');
    _effectCanvas.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:9995;width:100%;height:100%';
    _effectCanvas.width=window.innerWidth;_effectCanvas.height=window.innerHeight;
    document.body.appendChild(_effectCanvas);
  }
  return _effectCanvas;
}

function drawFireEffect(ctx,cx,cy,frame,total){
  const p=frame/total;
  ctx.save();
  // Outer flame - large sweeping arc (like GBA flamethrower)
  for(let i=0;i<3;i++){
    const offset=(i-1)*20;
    const scale=1-p*.3;
    ctx.globalAlpha=(1-p)*.8;
    ctx.beginPath();
    ctx.moveTo(cx+offset,cy+20);
    ctx.bezierCurveTo(cx+offset-30,cy-20*scale,cx+offset+30,cy-60*scale,cx+offset,cy-80*scale);
    ctx.bezierCurveTo(cx+offset-15,cy-60*scale,cx+offset+15,cy-40*scale,cx+offset,cy-10);
    const grad=ctx.createLinearGradient(cx,cy,cx,cy-80*scale);
    grad.addColorStop(0,'#ff4400');grad.addColorStop(.5,'#ff8800');grad.addColorStop(1,'#ffcc00');
    ctx.fillStyle=grad;ctx.fill();
  }
  // Inner bright core
  ctx.globalAlpha=(1-p)*.6;
  ctx.beginPath();
  ctx.arc(cx,cy-30*(1-p),15*(1-p*.5),0,Math.PI*2);
  ctx.fillStyle='#ffeeaa';ctx.fill();
  ctx.restore();
}

function drawWaterEffect(ctx,cx,cy,frame,total){
  const p=frame/total;
  ctx.save();
  // Water jet streams
  for(let i=0;i<5;i++){
    const off=(i-2)*12;
    const len=60*(1-p*.5);
    ctx.globalAlpha=(1-p)*.7;
    ctx.beginPath();
    ctx.ellipse(cx+off,cy-len/2,6-Math.abs(i-2),len/2,0,0,Math.PI*2);
    const g=ctx.createLinearGradient(0,cy,0,cy-len);
    g.addColorStop(0,'#0044ff');g.addColorStop(.5,'#44aaff');g.addColorStop(1,'#aaeeff');
    ctx.fillStyle=g;ctx.fill();
  }
  // Water splash rings on impact
  for(let r=0;r<3;r++){
    ctx.globalAlpha=(1-p)*(1-r*.25);
    ctx.beginPath();
    ctx.ellipse(cx,cy+10,15+r*15+p*30,5+r*3+p*8,0,0,Math.PI*2);
    ctx.strokeStyle='#44aaff';ctx.lineWidth=2-r*.5;ctx.stroke();
  }
  ctx.restore();
}

function drawElectricEffect(ctx,cx,cy,frame,total){
  const p=frame/total;
  ctx.save();
  // Star burst lightning (like Thunderbolt in GBA)
  const spikes=8;
  for(let i=0;i<spikes;i++){
    const angle=(i/spikes)*Math.PI*2+p*.5;
    const len=(40+Math.random()*30)*(1-p*.6);
    ctx.globalAlpha=(frame%2===0?1:.5)*(1-p)*.9;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    // Zigzag
    const mid={x:cx+Math.cos(angle)*len*.4+(Math.random()-0.5)*15,y:cy+Math.sin(angle)*len*.4+(Math.random()-0.5)*15};
    ctx.lineTo(mid.x,mid.y);
    ctx.lineTo(cx+Math.cos(angle)*len,cy+Math.sin(angle)*len);
    ctx.strokeStyle=frame%3===0?'#ffffff':'#ffee00';
    ctx.lineWidth=3-i*.2;ctx.stroke();
  }
  // Center flash
  ctx.globalAlpha=(1-p)*.8*(frame%2===0?1:.4);
  ctx.beginPath();ctx.arc(cx,cy,8*(1-p*.5),0,Math.PI*2);
  ctx.fillStyle='#ffffaa';ctx.fill();
  ctx.restore();
}

function drawIceEffect(ctx,cx,cy,frame,total){
  const p=frame/total;
  ctx.save();
  // Ice crystal spikes
  for(let i=0;i<6;i++){
    const angle=(i/6)*Math.PI*2;
    const len=(35+i*5)*(1-p*.4);
    ctx.globalAlpha=(1-p)*.8;
    ctx.save();ctx.translate(cx,cy);ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(0,0);ctx.lineTo(-5,len*.3);ctx.lineTo(0,len);ctx.lineTo(5,len*.3);ctx.closePath();
    const g=ctx.createLinearGradient(0,0,0,len);
    g.addColorStop(0,'#ffffff');g.addColorStop(.5,'#aaeeff');g.addColorStop(1,'#4488cc');
    ctx.fillStyle=g;ctx.fill();
    ctx.restore();
  }
  // Frost ring
  ctx.globalAlpha=(1-p)*.6;
  ctx.beginPath();ctx.arc(cx,cy,30*(1+p),0,Math.PI*2);
  ctx.strokeStyle='#88eeff';ctx.lineWidth=2;
  ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);
  ctx.restore();
}

function drawExplosionEffect(ctx,cx,cy,frame,total){
  const p=frame/total;
  ctx.save();
  const rings=[60,40,25];
  rings.forEach((r,i)=>{
    ctx.globalAlpha=(1-p)*(1-i*.2)*.7;
    ctx.beginPath();ctx.arc(cx,cy,r*(.3+p*.7),0,Math.PI*2);
    ctx.fillStyle=['#ff4400','#ff8800','#ffcc00'][i];ctx.fill();
    ctx.globalAlpha*=.3;
    ctx.strokeStyle='#ffffff';ctx.lineWidth=2;ctx.stroke();
  });
  // Spark particles
  for(let i=0;i<8;i++){
    const ang=(i/8)*Math.PI*2;const dist=50*p;
    ctx.globalAlpha=(1-p)*.6;
    ctx.beginPath();ctx.arc(cx+Math.cos(ang)*dist,cy+Math.sin(ang)*dist,3*(1-p),0,Math.PI*2);
    ctx.fillStyle='#ffcc00';ctx.fill();
  }
  ctx.restore();
}

function drawLeafEffect(ctx,cx,cy,frame,total){
  const p=frame/total;
  ctx.save();
  for(let i=0;i<10;i++){
    const ang=(i/10)*Math.PI*2+p*3;
    const dist=30+p*30;
    const x=cx+Math.cos(ang)*dist,y=cy+Math.sin(ang)*dist;
    ctx.globalAlpha=(1-p)*.7;
    ctx.save();ctx.translate(x,y);ctx.rotate(ang+p*5);
    ctx.beginPath();ctx.ellipse(0,0,8,4,0,0,Math.PI*2);
    ctx.fillStyle=p<.5?'#44cc44':'#88ee44';ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}

function drawPsychicEffect(ctx,cx,cy,frame,total){
  const p=frame/total;
  ctx.save();
  for(let r=0;r<4;r++){
    const phase=p+r*.2;
    const radius=20+r*15+phase*40;
    ctx.globalAlpha=Math.max(0,(1-phase/1.8)*.6);
    ctx.beginPath();ctx.arc(cx,cy,radius,0,Math.PI*2);
    ctx.strokeStyle=r%2?'#ff44cc':'#cc44ff';
    ctx.lineWidth=3-r*.5;ctx.stroke();
  }
  // Inner aura
  ctx.globalAlpha=(1-p)*.4;
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,30*(1-p*.5));
  g.addColorStop(0,'#ff88ff');g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,30*(1-p*.5),0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawRockEffect(ctx,cx,cy,frame,total){
  const p=frame/total;
  ctx.save();
  const positions=[[0,-40],[25,-20],[40,10],[-40,10],[-25,-20],[15,40],[-15,40]];
  positions.forEach(([ox,oy],i)=>{
    const scale=1-p*.6;
    const x=cx+ox*(1+p*.3),y=cy+oy*(1+p*.3);
    ctx.globalAlpha=(1-p)*.8;
    ctx.save();ctx.translate(x,y);ctx.rotate(p*Math.PI*(i%2?1:-1));
    const s=8*scale;
    ctx.beginPath();
    ctx.moveTo(0,-s);ctx.lineTo(s*.7,-s*.3);ctx.lineTo(s*.5,s*.7);
    ctx.lineTo(-s*.3,s);ctx.lineTo(-s,s*.2);ctx.closePath();
    ctx.fillStyle=['#aa7744','#cc9955','#886633'][i%3];ctx.fill();
    ctx.strokeStyle='#664422';ctx.lineWidth=1;ctx.stroke();
    ctx.restore();
  });
  // Ground dust
  ctx.globalAlpha=(1-p)*.3;
  ctx.beginPath();ctx.ellipse(cx,cy+5,40*p,8*p,0,0,Math.PI*2);
  ctx.fillStyle='#cc9944';ctx.fill();
  ctx.restore();
}

function playCanvasEffect(type,tx,ty){
  const cv=getEffectCanvas();
  const ctx=cv.getContext('2d');
  const total=18;let frame=0;
  const drawFns={
    fire:drawFireEffect,water:drawWaterEffect,electric:drawElectricEffect,
    ice:drawIceEffect,grass:drawLeafEffect,psychic:drawPsychicEffect,
    rock:drawRockEffect,ground:drawRockEffect,
    ghost:(ctx,cx,cy,f,t)=>{
      ctx.save();ctx.globalAlpha=(1-f/t)*.6;
      ctx.beginPath();ctx.arc(cx,cy,20+f*2,0,Math.PI*2);
      ctx.fillStyle='#440088';ctx.fill();
      for(let i=0;i<5;i++){
        const ang=i*Math.PI*.4+f*.2;
        ctx.beginPath();ctx.arc(cx+Math.cos(ang)*25,cy+Math.sin(ang)*15,8-f*.3,0,Math.PI*2);
        ctx.fillStyle='#8833ff';ctx.fill();
      }ctx.restore();
    },
    poison:(ctx,cx,cy,f,t)=>{
      ctx.save();ctx.globalAlpha=(1-f/t)*.7;
      for(let i=0;i<6;i++){
        const ang=(i/6)*Math.PI*2+f*.1;const r=15+f*1.5;
        ctx.beginPath();ctx.arc(cx+Math.cos(ang)*r,cy+Math.sin(ang)*r,7-f*.15,0,Math.PI*2);
        ctx.fillStyle=['#aa00ff','#8800cc','#cc44ff'][i%3];ctx.fill();
      }ctx.restore();
    },
  };
  const fn=drawFns[type]||drawExplosionEffect;
  const anim=()=>{
    ctx.clearRect(tx-100,ty-120,200,220);
    if(frame<total){fn(ctx,tx,ty,frame,total);frame++;requestAnimationFrame(anim);}
    else ctx.clearRect(0,0,cv.width,cv.height);
  };
  requestAnimationFrame(anim);
}

const TYPE_COLORS={

function getTypeColor(type){return TYPE_COLORS[type]||'#ffffff';}

// Clean attack effect: slot glow + sprite brightness burst
function triggerAttackEffect(fromWho,fromSlot,toWho,toSlot,type){
  const col=getTypeColor(type);
  
  // 1. Attacker brightens briefly
  const atkSlot=document.querySelector(`.field-slot[data-who="${fromWho}"][data-slot="${fromSlot}"]`);
  if(atkSlot){
    atkSlot.style.setProperty('--base-filter','drop-shadow(0 0 8px '+col+')');
    atkSlot.classList.add('slot-attacking');
    setTimeout(()=>atkSlot.classList.remove('slot-attacking'),450);
  }

  // 2. Traveling light burst (CSS div, not emoji)
  const fromR=atkSlot?.getBoundingClientRect();
  const toSlotEl=document.querySelector(`.field-slot[data-who="${toWho}"][data-slot="${toSlot}"]`);
  const toR=toSlotEl?.getBoundingClientRect();
  if(fromR&&toR){
    const burst=document.createElement('div');
    burst.style.cssText=`
      position:fixed;
      width:16px;height:16px;
      border-radius:50%;
      background:${col};
      box-shadow:0 0 12px ${col},0 0 24px ${col}88;
      pointer-events:none;z-index:9996;
      left:${fromR.left+fromR.width/2-8}px;
      top:${fromR.top+fromR.height/2-8}px;
      transition:left .22s cubic-bezier(.4,0,.2,1),top .22s cubic-bezier(.4,0,.2,1),
                 width .22s,height .22s,opacity .22s;
    `;
    document.body.appendChild(burst);
    requestAnimationFrame(()=>{
      burst.style.left=(toR.left+toR.width/2-24)+'px';
      burst.style.top=(toR.top+toR.height/2-24)+'px';
      burst.style.width='48px';burst.style.height='48px';
      burst.style.opacity='0';
    });
    setTimeout(()=>burst.remove(),300);
  }

  // 3. Target slot flashes with type color glow
  setTimeout(()=>{
    if(toSlotEl){
      toSlotEl.classList.add('slot-hit');
      setTimeout(()=>toSlotEl.classList.remove('slot-hit'),550);
    }
  },200);
}

// Clean hit flash: white then type color
function triggerHitFlash(who,slotIdx){
  const slot=document.querySelector(`.field-slot[data-who="${who}"][data-slot="${slotIdx}"]`);
  if(!slot)return;
  slot.style.position='relative';
  const fl=document.createElement('div');
  fl.style.cssText=`position:absolute;inset:0;border-radius:inherit;pointer-events:none;z-index:6;
    background:rgba(255,255,255,.4);animation:hitFlash .3s ease forwards`;
  slot.appendChild(fl);
  setTimeout(()=>fl.remove(),350);
}

function showCardPreview(card, color){
  removeCardPreview();
  if(!card)return;
  const prev=document.createElement('div');
  prev.id='card-preview';
  prev.style.setProperty('--preview-color', color||'#f0c040');
  const url=getSpriteUrl(card.id,card.shiny);
  prev.innerHTML=`
    <div style="font-size:.55em;color:${color};font-family:var(--pf,monospace);margin-bottom:6px">${card.name}</div>
    ${url?`<img src="${url}" style="width:72px;height:72px;image-rendering:pixelated;object-fit:contain">`:''}
    <div style="font-size:.6em;color:#aaa;margin-top:6px">
      ${card.spell?card.desc||'Magia':`⚔${card.atk} 🛡${card.def}`}
    </div>
    ${card.evoOnly?`<div style="font-size:.5em;color:#ff8866;margin-top:3px">🔒 Evo: ${byId(card.ef)?.name||''}</div>`:''}
    <div style="font-size:.48em;color:#666;margin-top:4px">💎${card.cost||MANA_COST[card.r||0]} mana</div>
  `;
  document.body.appendChild(prev);
  // Auto-remove after 4s
  prev._timeout = setTimeout(removeCardPreview, 4000);
  // Remove on tap outside
  setTimeout(()=>{
    const handler = e => {
      if(!e.target.closest('#card-preview') && !e.target.closest('[onclick*="handleHandCardClick"]')){
        removeCardPreview();
        document.removeEventListener('touchstart', handler);
        document.removeEventListener('click', handler);
      }
    };
    document.addEventListener('touchstart', handler, {once:false});
    document.addEventListener('click', handler, {once:false});
  }, 100);
}
function removeCardPreview(){
  const el=document.getElementById('card-preview');
  if(el){if(el._timeout)clearTimeout(el._timeout);el.remove();}
}

function handleHandCardClick(i){
  if(G.selHand===i){
    // Already selected - deselect unless it would evolve or use spell
    const c=G.pHand[i];
    if(!c)return;
    const hasBase=c.ef&&G.pField.some(f=>f&&f.id===c.ef);
    if(c.spell||hasBase){
      summonCard(i); // Use spell or evolve
    }else{
      G.selHand=-1;removeCardPreview();renderScreen('game');
    }
  }else{
    selectHand(i);
  }
}

function checkForUpdates(){
  if(!('serviceWorker' in navigator)){showToast('Service Worker não suportado.',2000);return;}
  navigator.serviceWorker.getRegistration().then(reg=>{
    if(!reg){showToast('SW não registrado.',2000);return;}
    reg.update().then(()=>{
      if(reg.waiting){
        reg.waiting.postMessage('skipWaiting');
        showToast('✅ Atualizando agora...',2000);
      } else {
        showToast('✅ Você já está na versão mais recente! v'+GAME_VERSION,2500);
      }
    });
  });
}


// ===== FORÇA ATUALIZAÇÃO SE SW ANTIGO =====
(function forceUpdate(){
  if(!('serviceWorker' in navigator)) return;
  // Registra/atualiza o SW imediatamente
  navigator.serviceWorker.register('./service-worker.js?v=41', {updateViaCache:'none'})
    .then(reg => {
      reg.update(); // Força checagem imediata
      if(reg.waiting) reg.waiting.postMessage('skipWaiting');
    });
  // controllerchange - só recarrega se não recarregou via SW_RELOAD
  navigator.serviceWorker.addEventListener('controllerchange', ()=>{
    if(!sessionStorage.getItem('sw_reloaded')){
      sessionStorage.setItem('sw_reloaded','1');
      location.reload();
    }
  });
})();
